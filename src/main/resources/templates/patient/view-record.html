<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Prescription | HealthcarePlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .prescription-card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .dashed-divider { border-top: 2px dashed #e2e8f0; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

<div class="max-w-2xl w-full prescription-card overflow-hidden">
    <!-- Header -->
    <div class="bg-emerald-600 p-8 text-white flex justify-between items-start">
        <div>
            <div class="flex items-center gap-2 mb-2">
                <i class="fa-solid fa-square-h text-2xl"></i>
                <span class="text-xl font-bold tracking-tight">HEALTHCARE<span class="font-light">PLUS</span></span>
            </div>
            <p class="text-sm text-emerald-100">Digital Health Network</p>
        </div>
        <div class="text-right">
            <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-1">Date</p>
            <p class="font-bold" th:text="${#temporals.format(record.recordDate, 'MMM dd, yyyy')}"></p>
        </div>
    </div>

    <!-- Body -->
    <div class="p-8">
        <div class="grid grid-cols-2 gap-8 mb-10">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Doctor</p>
                <p class="font-bold text-slate-800" th:text="${record.appointment.doctor.name}"></p>
                <p class="text-xs text-emerald-600 font-bold" th:text="${record.appointment.doctor.specialization}"></p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Patient</p>
                <p class="font-bold text-slate-800" th:text="${record.patient.fullName}"></p>
                <p class="text-xs text-slate-500" th:text="'ID: #PT-' + ${record.patient.id}"></p>
            </div>
        </div>

        <div class="mb-10">
            <h3 class="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-stethoscope text-emerald-600"></i> Diagnosis & Notes
            </h3>
            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-sm text-slate-600 leading-relaxed italic" th:text="${record.diagnosis}">
                No diagnosis provided.
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-pills text-emerald-600"></i> Prescribed Medication
            </h3>
            <div class="space-y-3">
                <div th:each="p : ${record.prescriptions}" class="p-4 border border-slate-100 rounded-2xl flex justify-between items-center bg-white shadow-sm hover:border-emerald-200 transition-all">
                    <div>
                        <p class="font-bold text-slate-800" th:text="${p.medication}"></p>
                        <p class="text-xs text-slate-500" th:text="${p.dosage}"></p>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-widest" th:text="${p.duration}">7 Days</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashed-divider my-8"></div>

        <div class="flex justify-between items-center">
            <a href="/patient/history" class="text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">
                <i class="fa-solid fa-arrow-left"></i> Back to History
            </a>
            <button onclick="window.print()" class="px-6 py-3 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-all shadow-lg">
                <i class="fa-solid fa-print mr-2"></i> Print Report
            </button>
        </div>
    </div>

    <!-- Footer -->
    <div class="bg-slate-50 p-6 text-center border-t border-slate-100">
        <p class="text-[10px] text-slate-400 font-medium">This is a digitally generated medical record. No physical signature required.</p>
    </div>
</div>

</body>
</html>
