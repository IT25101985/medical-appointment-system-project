<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .star-rating i {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .star-rating i:hover {
            transform: scale(1.25);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .star-active {
            color: #f59e0b !important; /* Amber-500 */
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
<div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border border-gray-100">
    <!-- Success Icon with Pulse -->
    <div class="relative w-20 h-20 mx-auto mb-6">
        <div class="absolute inset-0 bg-green-100 rounded-full animate-ping opacity-25"></div>
        <div class="relative w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-check text-4xl"></i>
        </div>
    </div>

    <h1 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">Payment Successful!</h1>
    <p class="text-gray-500 mb-8 text-sm">Your invoice has been generated and your appointment is fully paid.</p>

    <!-- Invoice Summary Card -->
    <div class="bg-gray-50/80 p-5 rounded-2xl mb-8 text-left border border-gray-100">
        <div class="flex justify-between mb-2">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Invoice ID</span>
            <span class="font-mono font-bold text-gray-700" th:text="'#' + ${invoice.id}">#8821</span>
        </div>
        <div class="flex justify-between mb-2">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Amount Paid</span>
            <span class="font-bold text-emerald-600" th:text="'$' + ${invoice.amount}">$120.00</span>
        </div>
        <div class="flex justify-between">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</span>
            <span class="px-2.5 py-0.5 bg-green-50 text-green-700 text-[10px] font-black uppercase rounded-full border border-green-200" th:text="${invoice.status}">PAID</span>
        </div>
    </div>

    <!-- Feedback Section -->
    <div class="bg-white p-6 rounded-2xl mb-8 border-2 border-blue-50 text-center shadow-sm">
        <h3 class="text-sm font-bold text-gray-700 mb-1">
            How was your experience with
        </h3>
        <p class="text-blue-600 font-bold mb-4">Dr. <span th:text="${invoice.appointment.doctor.name}">Smith</span></p>

        <form action="/feedback/add" method="post" id="feedbackForm">
            <input type="hidden" name="doctorId" th:value="${invoice.appointment.doctor.id}">
            <!-- This hidden input stores the rating value -->
            <input type="hidden" name="rating" id="ratingValue" value="5" required>

            <!-- Animated Stars -->
            <div class="flex gap-3 justify-center mb-2 star-rating">
                <i class="fa-solid fa-star text-2xl cursor-pointer text-gray-200 star-btn" data-index="1"></i>
                <i class="fa-solid fa-star text-2xl cursor-pointer text-gray-200 star-btn" data-index="2"></i>
                <i class="fa-solid fa-star text-2xl cursor-pointer text-gray-200 star-btn" data-index="3"></i>
                <i class="fa-solid fa-star text-2xl cursor-pointer text-gray-200 star-btn" data-index="4"></i>
                <i class="fa-solid fa-star text-2xl cursor-pointer text-gray-200 star-btn" data-index="5"></i>
            </div>
            <p id="ratingLabel" class="text-[10px] font-bold uppercase tracking-widest text-amber-500 mb-4 transition-all">Excellent</p>

            <textarea name="comments" placeholder="Any thoughts on the session?"
                      class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm outline-none focus:ring-4 focus:ring-blue-500/10 focus:bg-white transition-all mb-4"
                      rows="2"></textarea>

            <button type="submit" class="w-full bg-gray-900 text-white text-xs font-bold py-3.5 rounded-xl hover:bg-black transition-all shadow-lg active:scale-[0.98]">
                Submit Feedback
            </button>
        </form>
    </div>

    <a href="/patient/history" class="inline-flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-blue-600 transition-colors">
        <i class="fa-solid fa-arrow-left"></i> Return to History
    </a>
</div>

<script>
    const stars = document.querySelectorAll('.star-btn');
    const ratingInput = document.getElementById('ratingValue');
    const label = document.getElementById('ratingLabel');
    const labels = {
        1: 'Poor',
        2: 'Fair',
        3: 'Good',
        4: 'Very Good',
        5: 'Excellent'
    };

    function updateStars(rating) {
        stars.forEach((star, idx) => {
            if (idx < rating) {
                star.classList.add('star-active', 'fa-solid');
                star.classList.remove('fa-regular', 'text-gray-200');
            } else {
                star.classList.remove('star-active', 'fa-solid');
                star.classList.add('fa-regular', 'text-gray-200');
            }
        });
        label.textContent = labels[rating];
    }

    stars.forEach(star => {
        star.addEventListener('click', () => {
            const rating = star.getAttribute('data-index');
            ratingInput.value = rating;
            updateStars(rating);
        });

        // Optional: Hover preview effect
        star.addEventListener('mouseenter', () => {
            updateStars(star.getAttribute('data-index'));
        });
    });

    // Reset to current selected value when mouse leaves the star container
    document.querySelector('.star-rating').addEventListener('mouseleave', () => {
        updateStars(ratingInput.value);
    });

    // Initialize as 5 stars
    updateStars(5);
</script>
</body>
</html>
