<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare Plus — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/theme.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg1: #0f172a;
          --bg2: #1e293b;
          --glass: rgba(255,255,255,0.06);
          --glass-border: rgba(255,255,255,0.12);
          --text: #f1f5f9;
          --text-muted: #94a3b8;
          --blue: #3b82f6;
          --teal: #14b8a6;
          --glow: rgba(59,130,246,0.4);
          --input-bg: rgba(255,255,255,0.05);
        }

        .light-mode {
          --bg1: #eff6ff;
          --bg2: #f0fdfa;
          --glass: rgba(255,255,255,0.7);
          --glass-border: rgba(148,163,184,0.3);
          --text: #0f172a;
          --text-muted: #64748b;
          --glow: rgba(59,130,246,0.25);
          --input-bg: rgba(255,255,255,0.8);
        }

        body {
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
          transition: background 0.5s ease;
          position: relative;
          overflow: hidden;
        }

        /* ── Animated blobs ── */
        .blob {
          position: fixed;
          border-radius: 50%;
          filter: blur(80px);
          opacity: 0.18;
          animation: float 8s ease-in-out infinite;
          pointer-events: none;
        }
        .blob-1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: #14b8a6; bottom: -100px; right: -80px; animation-delay: 3s; }

        @keyframes float {
          0%, 100% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-30px) scale(1.05); }
        }

        /* ── Main card ── */
        .reset-card {
          position: relative;
          z-index: 10;
          width: 100%;
          max-width: 440px;
          background: var(--glass);
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
          border: 1px solid var(--glass-border);
          border-radius: 28px;
          padding: 44px 40px;
          box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
          animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(30px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo ── */
        .logo-wrap {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 32px;
        }
        .logo-icon {
          width: 48px; height: 48px;
          background: linear-gradient(135deg, #2563eb, #14b8a6);
          border-radius: 16px;
          display: flex; align-items: center; justify-content: center;
          font-size: 20px; color: white;
          box-shadow: 0 8px 20px rgba(59,130,246,0.4);
          animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
          0%,100% { box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
          50%      { box-shadow: 0 8px 30px rgba(59,130,246,0.7); }
        }
        .logo-text { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .logo-text span { color: #14b8a6; }

        /* ── Heading ── */
        .card-title { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 6px; }
        .card-sub { font-size: 13px; color: var(--text-muted); font-weight: 400; margin-bottom: 28px; line-height: 1.6; }

        /* ── Alert boxes ── */
        .alert {
          display: flex; align-items: center; gap: 10px;
          padding: 12px 16px; border-radius: 14px;
          font-size: 13px; font-weight: 500;
          margin-bottom: 20px;
          animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
        .alert-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .alert-success { background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.25); color: #5eead4; }

        /* ── Input groups ── */
        .field-group { margin-bottom: 18px; }
        .field-label {
          display: block;
          font-size: 11px; font-weight: 700;
          text-transform: uppercase; letter-spacing: 0.08em;
          color: var(--text-muted);
          margin-bottom: 8px;
          transition: color 0.2s;
        }
        .field-wrap {
          position: relative;
          display: flex; align-items: center;
        }
        .field-icon {
          position: absolute; left: 16px;
          color: var(--text-muted);
          font-size: 15px;
          transition: color 0.3s;
          pointer-events: none;
        }
        .field-input {
          width: 100%;
          background: var(--input-bg);
          border: 1.5px solid var(--glass-border);
          border-radius: 14px;
          padding: 14px 16px 14px 46px;
          font-size: 14px; font-weight: 500;
          color: var(--text);
          outline: none;
          transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
          font-family: 'Inter', sans-serif;
        }
        .field-input::placeholder { color: var(--text-muted); font-weight: 400; }
        .field-input:focus {
          border-color: #3b82f6;
          box-shadow: 0 0 0 4px var(--glow);
          background: rgba(59,130,246,0.06);
        }
        .field-input:focus ~ .field-icon,
        .field-wrap:focus-within .field-icon { color: #3b82f6; }
        .field-group:focus-within .field-label { color: #3b82f6; }

        /* ── Submit button ── */
        .btn-submit {
          width: 100%; padding: 15px;
          background: linear-gradient(135deg, #2563eb 0%, #14b8a6 100%);
          border: none; border-radius: 14px;
          font-family: 'Inter', sans-serif;
          font-size: 15px; font-weight: 700;
          color: white; cursor: pointer;
          letter-spacing: 0.01em;
          position: relative; overflow: hidden;
          transition: transform 0.2s, box-shadow 0.2s;
          box-shadow: 0 6px 20px rgba(59,130,246,0.35);
          margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(59,130,246,0.45); }
        .btn-submit:active { transform: translateY(0); }

        /* ── Back link ── */
        .back-text {
          text-align: center; margin-top: 22px;
          font-size: 13px; color: var(--text-muted);
        }
        .back-text a { color: #14b8a6; font-weight: 700; text-decoration: none; }
        .back-text a:hover { text-decoration: underline; }

    </style>
    <link rel="stylesheet" href="/css/dark-mode.css">
</head>
<body id="body">

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="reset-card">
    <a href="/" class="logo-wrap" style="text-decoration: none;">
        <div class="logo-icon"><i class="fa-solid fa-unlock-keyhole"></i></div>
        <div>
            <div class="logo-text">HealthCare<span>Plus</span></div>
            <p style="font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-top:1px">Security Central</p>
        </div>
    </a>

    <h1 class="card-title">Reset Password 🔒</h1>
    <p class="card-sub">Forgot your password? No problem. Verify your username and create a new password instantly.</p>

    <div th:if="${param.error}" class="alert alert-error">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>Username not found. Please try again.</span>
    </div>
    <div th:if="${param.success}" class="alert alert-success">
        <i class="fa-solid fa-circle-check"></i>
        <span>Password has been successfully reset!</span>
    </div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="field-group">
            <label class="field-label" for="username">Username</label>
            <div class="field-wrap">
                <i class="fa-solid fa-user field-icon"></i>
                <input type="text" id="username" name="username" class="field-input" placeholder="Enter your username" required>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label" for="newPassword">New Password</label>
            <div class="field-wrap">
                <i class="fa-solid fa-lock field-icon"></i>
                <input type="password" id="newPassword" name="newPassword" class="field-input" placeholder="Enter new password" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fa-solid fa-key mr-2"></i> Update Password
        </button>
    </form>

    <p class="back-text">
        Remember your password? <a href="/login">Return to Sign In</a>
    </p>
</div>

<script>
    // Simple light/dark auto theme for consistency
    const hour = new Date().getHours();
    if (hour >= 6 && hour < 19) {
      document.getElementById('body').classList.add('light-mode');
    }
</script>

</body>
</html>
