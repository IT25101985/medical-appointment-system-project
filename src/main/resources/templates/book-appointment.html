<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | MediCare</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --primary: #003366;
            --accent: #0077CC;
            --gold: #FFB800;
            --dark: #1A1A2E;
            --bg: #F4F6F9;
            --white: #FFFFFF;
            --border: #E2E8F0;
            --text: #1A1A2E;
            --text-muted: #94A3B8;
            --success: #10B981;
            --danger: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .booking-container {
            width: 100%;
            max-width: 720px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== CARD ===== */
        .booking-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .card-header {
            background: linear-gradient(
                135deg, var(--primary) 0%,
                #0056A0 50%, var(--accent) 100%
            );
            padding: 40px 35px 50px;
            text-align: center;
            color: var(--white);
            position: relative;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: -15px; left: 0; right: 0;
            height: 30px;
            background: var(--white);
            border-radius: 50% 50% 0 0;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -30%; right: -5%;
            width: 200px; height: 200px;
            background: rgba(255,184,0,0.08);
            border-radius: 50%;
        }

        .header-icon {
            width: 70px; height: 70px;
            background: rgba(255,184,0,0.15);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 15px;
            animation: pulse 2s infinite;
            border: 2px solid rgba(255,184,0,0.25);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        .card-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .card-header p {
            font-size: 0.88rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* ===== PROGRESS STEPS ===== */
        .progress-steps {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 30px 35px 0;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 15%; right: 15%;
            height: 2px;
            background: var(--border);
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            z-index: 1;
        }

        .step-dot {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .step.active .step-dot {
            background: linear-gradient(
                135deg, var(--primary), var(--accent)
            );
            color: white;
            box-shadow: 0 4px 12px rgba(0,51,102,0.3);
        }

        .step.done .step-dot {
            background: var(--success);
            color: white;
        }

        .step-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .step.active .step-label {
            color: var(--primary);
        }

        /* ===== FORM BODY ===== */
        .card-body {
            padding: 20px 35px 35px;
        }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border-left: 4px solid var(--success);
        }

        .alert-danger {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #4A5568;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .form-label .required {
            color: var(--danger);
            font-size: 0.7rem;
        }

        .form-control {
            padding: 11px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            color: var(--text);
            transition: all 0.3s ease;
            outline: none;
            background: #F8FAFC;
        }

        .form-control:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,119,204,0.1);
        }

        .form-control.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
        }

        .form-control.valid {
            border-color: var(--success);
        }

        .error-text {
            font-size: 0.73rem;
            color: var(--danger);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(
                135deg, var(--primary), var(--accent)
            );
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(
                90deg, transparent,
                rgba(255,255,255,0.2), transparent
            );
            transition: left 0.5s ease;
        }

        .btn-submit:hover::after { left: 100%; }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,51,102,0.35);
        }

        .btn-submit:active { transform: translateY(-1px); }

        .back-link {
            text-align: center;
            margin-top: 18px;
        }

        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.3s;
        }

        .back-link a:hover { gap: 10px; }

        /* Responsive */
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .card-body { padding: 15px 20px 25px; }
            .card-header { padding: 30px 20px 40px; }
            .card-header h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="booking-container">
    <div class="booking-card">

        <!-- Header -->
        <div class="card-header">
            <div class="header-icon">📅</div>
            <h1>Book Appointment</h1>
            <p>Schedule a visit with our expert doctors</p>
        </div>

        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step done">
                <div class="step-dot">✓</div>
                <span class="step-label">Patient</span>
            </div>
            <div class="step active">
                <div class="step-dot">2</div>
                <span class="step-label">Doctor</span>
            </div>
            <div class="step active">
                <div class="step-dot">3</div>
                <span class="step-label">Schedule</span>
            </div>
            <div class="step">
                <div class="step-dot">4</div>
                <span class="step-label">Confirm</span>
            </div>
        </div>

        <!-- Body -->
        <div class="card-body">

            <!-- Alerts -->
            <div th:if="${successMessage}"
                 class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <!-- Form -->
            <form th:action="@{/appointments/book}"
                  th:object="${appointment}"
                  method="post"
                  id="bookingForm"
                  novalidate>

                <div class="form-grid">

                    <!-- Patient Name -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user"></i>
                            Patient Name
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               th:field="*{patientName}"
                               th:class="${#fields.hasErrors(
                                   'patientName')} ?
                                   'form-control error' :
                                   'form-control'"
                               placeholder="Full name"
                               id="patientName">
                        <span class="error-text"
                              th:if="${#fields.hasErrors(
                                  'patientName')}">
                            <i class="fas fa-exclamation-circle">
                            </i>
                            <span th:errors="*{patientName}">
                            </span>
                        </span>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i>
                            Email
                            <span class="required">*</span>
                        </label>
                        <input type="email"
                               th:field="*{patientEmail}"
                               th:class="${#fields.hasErrors(
                                   'patientEmail')} ?
                                   'form-control error' :
                                   'form-control'"
                               placeholder="email@example.com"
                               id="patientEmail">
                        <span class="error-text"
                              th:if="${#fields.hasErrors(
                                  'patientEmail')}">
                            <i class="fas fa-exclamation-circle">
                            </i>
                            <span th:errors="*{patientEmail}">
                            </span>
                        </span>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-phone"></i>
                            Phone
                            <span class="required">*</span>
                        </label>
                        <input type="tel"
                               th:field="*{patientPhone}"
                               th:class="${#fields.hasErrors(
                                   'patientPhone')} ?
                                   'form-control error' :
                                   'form-control'"
                               placeholder="0771234567"
                               maxlength="10"
                               id="patientPhone">
                        <span class="error-text"
                              th:if="${#fields.hasErrors(
                                  'patientPhone')}">
                            <i class="fas fa-exclamation-circle">
                            </i>
                            <span th:errors="*{patientPhone}">
                            </span>
                        </span>
                    </div>

                    <!-- Specialization -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-stethoscope"></i>
                            Specialization
                            <span class="required">*</span>
                        </label>
                        <select th:field="*{specialization}"
                                th:class="${#fields.hasErrors(
                                    'specialization')} ?
                                    'form-control error' :
                                    'form-control'"
                                id="specialization">
                            <option value="">-- Select --</option>
                            <option th:each="s : ${specializations}"
                                    th:value="${s}"
                                    th:text="${s}"></option>
                        </select>
                        <span class="error-text"
                              th:if="${#fields.hasErrors(
                                  'specialization')}">
                            <i class="fas fa-exclamation-circle">
                            </i>
                            <span th:errors="*{specialization}">
                            </span>
                        </span>
                    </div>

                    <!-- Doctor -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user-md"></i>
                            Doctor
                            <span class="required">*</span>
                        </label>
                        <select th:field="*{doctorName}"
                                th:class="${#fields.hasErrors(
                                    'doctorName')} ?
                                    'form-control error' :
                                    'form-control'"
                                id="doctorName">
                            <option value="">-- Select --</option>
                            <option th:each="d : ${doctors}"
                                    th:value="${d}"
                                    th:text="${d}"></option>
                        </select>
                        <span class="error-text"
                              th:if="${#fields.hasErrors(
                                  'doctorName')}">
                            <i class="fas fa-exclamation-circle">
                            </i>
                            <span th:errors="*{doctorName}">
                            </span>
                        </span>
                    </div>

                    <!-- Date -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-calendar-alt"></i>
                            Date
                            <span class="required">*</span>
                        </label>
                        <input type="date"
                               th:field="*{appointmentDate}"
                               th:class="${#fields.hasErrors(
                                   'appointmentDate')} ?
                                   'form-control error' :
                                   'form-control'"
                               id="appointmentDate">
                        <span class="error-text"
                              th:if="${#fields.hasErrors(
                                  'appointmentDate')}">
                            <i class="fas fa-exclamation-circle">
                            </i>
                            <span th:errors="*{appointmentDate}">
                            </span>
                        </span>
                    </div>

                    <!-- Time -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-clock"></i>
                            Time
                            <span class="required">*</span>
                        </label>
                        <input type="time"
                               th:field="*{appointmentTime}"
                               th:class="${#fields.hasErrors(
                                   'appointmentTime')} ?
                                   'form-control error' :
                                   'form-control'"
                               min="08:00" max="17:00"
                               id="appointmentTime">
                        <span class="error-text"
                              th:if="${#fields.hasErrors(
                                  'appointmentTime')}">
                            <i class="fas fa-exclamation-circle">
                            </i>
                            <span th:errors="*{appointmentTime}">
                            </span>
                        </span>
                    </div>

                    <!-- Notes -->
                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fas fa-notes-medical"></i>
                            Notes (Optional)
                        </label>
                        <textarea th:field="*{notes}"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Describe symptoms..."
                                  id="notes"></textarea>
                    </div>

                </div>

                <!-- Submit -->
                <button type="submit" class="btn-submit">
                    <i class="fas fa-calendar-check"></i>
                    Confirm Appointment
                </button>

            </form>

            <div class="back-link">
                <a th:href="@{/appointments}">
                    <i class="fas fa-arrow-left"></i>
                    Back to Dashboard
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    // Set min date to today
    const dateInput = document.getElementById('appointmentDate');
    if (dateInput) {
        dateInput.min = new Date().toISOString().split('T')[0];
    }

    // Phone - digits only
    document.getElementById('patientPhone')
        ?.addEventListener('keypress', function(e) {
            if (!/[0-9]/.test(e.key)) e.preventDefault();
        });

    // Real-time validation
    document.querySelectorAll('.form-control').forEach(el => {
        el.addEventListener('blur', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
                this.classList.add('valid');
            }
        });
        el.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
            }
        });
    });
</script>

</body>
</html>
