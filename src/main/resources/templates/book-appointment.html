<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | MediCare</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
            text-align: center;
            color: white;
            position: relative;
        }

        .card-header::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: white;
            border-radius: 50% 50% 0 0;
        }

        .card-header .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .card-body {
            padding: 50px 40px 40px;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #e2e8f0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .step-circle.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .step-label {
            font-size: 0.75rem;
            color: #718096;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label .required {
            color: #e53e3e;
        }

        .form-control {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: #2d3748;
            transition: all 0.3s ease;
            outline: none;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        .form-control.error {
            border-color: #e53e3e;
            box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.1);
        }

        .error-message {
            font-size: 0.75rem;
            color: #e53e3e;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .input-wrapper .form-control {
            padding-left: 40px;
        }

        .input-wrapper .form-control:focus + .input-icon,
        .input-wrapper:has(.form-control:focus) .input-icon {
            color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                    90deg, transparent,
                    rgba(255,255,255,0.2), transparent
            );
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .alert-success {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #276749;
        }

        .alert-danger {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #9b2c2c;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.3s ease;
        }

        .back-link a:hover {
            gap: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .card-body {
                padding: 40px 20px 30px;
            }

            .card-header {
                padding: 30px 20px;
            }
        }

        /* Loading Animation */
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .submit-btn.submitting .loading {
            display: inline-block;
        }

        .submit-btn.submitting .btn-text {
            opacity: 0.7;
        }

        /* Time Slots */
        .time-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .time-slot {
            padding: 8px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.2s ease;
        }

        .time-slot:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .time-slot.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
        }

        .time-slot.unavailable {
            background: #f7fafc;
            color: #a0aec0;
            cursor: not-allowed;
            text-decoration: line-through;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Header -->
        <div class="card-header">
            <div class="icon">📅</div>
            <h1>Book Appointment</h1>
            <p>Schedule your visit with our expert doctors</p>
        </div>

        <!-- Body -->
        <div class="card-body">

            <!-- Success/Error Messages -->
            <div th:if="${successMessage}"
                 class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <div th:if="${errorMessage}"
                 class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- Progress Steps -->
            <div class="progress-bar">
                <div class="progress-step">
                    <div class="step-circle active">1</div>
                    <span class="step-label">Patient Info</span>
                </div>
                <div class="progress-step">
                    <div class="step-circle active">2</div>
                    <span class="step-label">Doctor</span>
                </div>
                <div class="progress-step">
                    <div class="step-circle active">3</div>
                    <span class="step-label">Schedule</span>
                </div>
                <div class="progress-step">
                    <div class="step-circle">✓</div>
                    <span class="step-label">Confirm</span>
                </div>
            </div>

            <!-- Form -->
            <form th:action="@{/appointments/book}"
                  th:object="${appointment}"
                  method="post"
                  id="bookingForm"
                  novalidate>

                <div class="form-grid">

                    <!-- Patient Name -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user"></i>
                            Patient Name <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="text"
                                   th:field="*{patientName}"
                                   th:class="${#fields.hasErrors('patientName')}
                                       ? 'form-control error' : 'form-control'"
                                   placeholder="Enter full name"
                                   id="patientName">
                        </div>
                        <div class="error-message"
                             th:if="${#fields.hasErrors('patientName')}">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:errors="*{patientName}"></span>
                        </div>
                    </div>

                    <!-- Patient Email -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i>
                            Email Address <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="email"
                                   th:field="*{patientEmail}"
                                   th:class="${#fields.hasErrors('patientEmail')}
                                       ? 'form-control error' : 'form-control'"
                                   placeholder="your@email.com"
                                   id="patientEmail">
                        </div>
                        <div class="error-message"
                             th:if="${#fields.hasErrors('patientEmail')}">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:errors="*{patientEmail}"></span>
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-phone"></i>
                            Phone Number <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="tel"
                                   th:field="*{patientPhone}"
                                   th:class="${#fields.hasErrors('patientPhone')}
                                       ? 'form-control error' : 'form-control'"
                                   placeholder="0771234567"
                                   id="patientPhone"
                                   maxlength="10">
                        </div>
                        <div class="error-message"
                             th:if="${#fields.hasErrors('patientPhone')}">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:errors="*{patientPhone}"></span>
                        </div>
                    </div>

                    <!-- Specialization -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-stethoscope"></i>
                            Specialization <span class="required">*</span>
                        </label>
                        <select th:field="*{specialization}"
                                th:class="${#fields.hasErrors('specialization')}
                                    ? 'form-control error' : 'form-control'"
                                id="specialization"
                                onchange="filterDoctors()">
                            <option value="">-- Select Specialization --</option>
                            <option th:each="spec : ${specializations}"
                                    th:value="${spec}"
                                    th:text="${spec}"></option>
                        </select>
                        <div class="error-message"
                             th:if="${#fields.hasErrors('specialization')}">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:errors="*{specialization}"></span>
                        </div>
                    </div>

                    <!-- Doctor -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user-md"></i>
                            Select Doctor <span class="required">*</span>
                        </label>
                        <select th:field="*{doctorName}"
                                th:class="${#fields.hasErrors('doctorName')}
                                    ? 'form-control error' : 'form-control'"
                                id="doctorSelect">
                            <option value="">-- Select Doctor --</option>
                            <option th:each="doc : ${doctors}"
                                    th:value="${doc}"
                                    th:text="${doc}"></option>
                        </select>
                        <div class="error-message"
                             th:if="${#fields.hasErrors('doctorName')}">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:errors="*{doctorName}"></span>
                        </div>
                    </div>

                    <!-- Appointment Date -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-calendar-alt"></i>
                            Appointment Date <span class="required">*</span>
                        </label>
                        <input type="date"
                               th:field="*{appointmentDate}"
                               th:class="${#fields.hasErrors('appointmentDate')}
                                   ? 'form-control error' : 'form-control'"
                               id="appointmentDate"
                               th:min="${#temporals.format(
                                   #temporals.createNow(), 'yyyy-MM-dd'
                               )}"
                               onchange="loadTimeSlots()">
                        <div class="error-message"
                             th:if="${#fields.hasErrors('appointmentDate')}">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:errors="*{appointmentDate}"></span>
                        </div>
                    </div>

                    <!-- Appointment Time -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-clock"></i>
                            Appointment Time <span class="required">*</span>
                        </label>
                        <input type="time"
                               th:field="*{appointmentTime}"
                               th:class="${#fields.hasErrors('appointmentTime')}
                                   ? 'form-control error' : 'form-control'"
                               id="appointmentTime"
                               min="08:00"
                               max="17:00">
                        <div class="error-message"
                             th:if="${#fields.hasErrors('appointmentTime')}">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:errors="*{appointmentTime}"></span>
                        </div>
                    </div>

                    <!-- Notes -->
                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fas fa-notes-medical"></i>
                            Additional Notes (Optional)
                        </label>
                        <textarea th:field="*{notes}"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Describe your symptoms or any special requests..."
                                  id="notes"></textarea>
                    </div>

                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">
                        <i class="fas fa-calendar-check"></i>
                        Confirm Appointment
                    </span>
                    <span class="loading"></span>
                </button>

            </form>

            <!-- Back Link -->
            <div class="back-link">
                <a th:href="@{/appointments}">
                    <i class="fas fa-arrow-left"></i>
                    Back to Appointments
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    // ✅ Client-side validation
    document.getElementById('bookingForm')
        .addEventListener('submit', function(e) {
            let isValid = true;
            const fields = [
                'patientName', 'patientEmail',
                'patientPhone', 'appointmentDate', 'appointmentTime'
            ];

            fields.forEach(fieldId => {
                const field = document.getElementById(fieldId);
                if (field && !field.value.trim()) {
                    field.classList.add('error');
                    isValid = false;
                } else if (field) {
                    field.classList.remove('error');
                }
            });

            // Email validation
            const email = document.getElementById('patientEmail');
            if (email && email.value &&
                !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                email.classList.add('error');
                isValid = false;
            }

            // Phone validation (10 digits)
            const phone = document.getElementById('patientPhone');
            if (phone && phone.value &&
                !/^[0-9]{10}$/.test(phone.value)) {
                phone.classList.add('error');
                isValid = false;
            }

            // Date validation (not in past)
            const dateField = document.getElementById('appointmentDate');
            if (dateField && dateField.value) {
                const selectedDate = new Date(dateField.value);
                const today = new Date();
                today.setHours(0,0,0,0);
                if (selectedDate < today) {
                    dateField.classList.add('error');
                    isValid = false;
                }
            }

            if (!isValid) {
                e.preventDefault();
                // Scroll to first error
                document.querySelector('.error')?.scrollIntoView({
                    behavior: 'smooth', block: 'center'
                });
            } else {
                // Show loading
                const btn = document.getElementById('submitBtn');
                btn.classList.add('submitting');
                btn.disabled = true;
            }
        });

    // Real-time validation feedback
    document.querySelectorAll('.form-control').forEach(input => {
        input.addEventListener('blur', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
                this.style.borderColor = '#48bb78';
            } else if (this.required || this.closest('.form-group')
                .querySelector('.required')) {
                this.classList.add('error');
            }
        });

        input.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
            }
        });
    });

    // Set minimum date to today
    const dateInput = document.getElementById('appointmentDate');
    if (dateInput) {
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
    }

    // Phone number - only allow digits
    const phoneInput = document.getElementById('patientPhone');
    if (phoneInput) {
        phoneInput.addEventListener('keypress', function(e) {
            if (!/[0-9]/.test(e.key)) {
                e.preventDefault();
            }
        });
    }

    function filterDoctors() {
        // Can be enhanced with AJAX to fetch doctors by specialization
        console.log('Filtering doctors...');
    }

    function loadTimeSlots() {
        // Can be enhanced to show available time slots for selected date
        console.log('Loading time slots...');
    }
</script>

</body>
</html>
