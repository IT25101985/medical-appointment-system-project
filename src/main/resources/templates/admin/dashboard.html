<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCarePlus - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Video Background Styling */
        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.6) saturate(1.2);
        }

        /* Enhanced Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-link {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link:hover {
            background: #4f46e5;
            transform: translateY(-5px) scale(1.02);
            border-color: transparent;
        }

        /* Home Button & Theme Switch Enhancements */
        .modern-home-btn, .theme-switch {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6" data-theme="light">

<video autoplay muted loop id="video-bg" poster="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=2000">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-plexus-lines-background-33392-large.mp4" type="video/mp4">
</video>

<a href="/" class="modern-home-btn fixed top-5 left-5 bg-emerald-600/80 text-white px-6 py-2 rounded-full font-semibold flex items-center gap-2 hover:bg-blue-700 transition-all z-50">
    <i class="fa-solid fa-house-chimney-medical"></i> Home
</a>

<div class="theme-switch fixed top-5 right-5 w-11 h-11 flex items-center justify-center rounded-full bg-slate-900 border border-slate-800 text-white/20 text-white cursor-pointer z-50" id="theme-toggle">
    <i class="fa-solid fa-moon"></i>
</div>

<main class="glass-card animate__animated animate__zoomIn max-w-4xl w-full rounded-3xl overflow-hidden">
    <header class="bg-emerald-600/40 p-10 text-white flex justify-between items-center border-b border-white/10">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">HealthCare<span style="color: #10b981;">Plus</span></h1>
            <p class="text-indigo-100 text-sm mt-1">Admin Dashboard | Secure Personnel Node</p>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="bg-red-500/80 hover:bg-red-600 px-5 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg">
                Logout
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </form>
    </header>

    <nav class="p-10">
        <ul class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <li class="animate__animated animate__fadeInLeft animate__delay-1s">
                <a href="/admin/doctors" class="nav-link block p-8 rounded-2xl group">
                    <div class="flex items-center space-x-5">
                        <div class="p-4 bg-indigo-500/20 rounded-2xl group-hover:bg-slate-900 border border-slate-800 text-white group-hover:text-emerald-500 transition-all text-2xl text-indigo-200">
                            <i class="fa-solid fa-user-doctor"></i>
                        </div>
                        <div>
                            <span class="block text-xl font-bold text-white mb-1">Manage Doctors</span>
                            <span class="text-sm text-gray-300 group-hover:text-indigo-100">Profiles, schedules, and departments</span>
                        </div>
                    </div>
                </a>
            </li>

            <li class="animate__animated animate__fadeInRight animate__delay-1s">
                <a href="/admin/appointments" class="nav-link block p-8 rounded-2xl group">
                    <div class="flex items-center space-x-5">
                        <div class="p-4 bg-emerald-500/20 rounded-2xl group-hover:bg-slate-900 border border-slate-800 text-white group-hover:text-emerald-600 transition-all text-2xl text-emerald-200">
                            <i class="fa-solid fa-calendar-check"></i>
                        </div>
                        <div>
                            <span class="block text-xl font-bold text-white mb-1">Appointments</span>
                            <span class="text-sm text-gray-300 group-hover:text-emerald-100">Real-time patient booking logs</span>
                        </div>
                    </div>
                </a>
            </li>
            <li class="animate__animated animate__fadeInUp animate__delay-1s">
                <a href="/admin/users" class="nav-link block p-8 rounded-2xl group">
                    <div class="flex items-center space-x-5">
                        <div class="p-4 bg-blue-500/20 rounded-2xl group-hover:bg-slate-900 border border-slate-800 text-white group-hover:text-blue-600 transition-all text-2xl text-blue-200">
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <div>
                            <span class="block text-xl font-bold text-white mb-1">Manage Users</span>
                            <span class="text-sm text-gray-300 group-hover:text-blue-100">Patients, Doctors, and Admins</span>
                        </div>
                    </div>
                </a>
            </li>
        </ul>
    </nav>

    <footer class="bg-black/20 p-6 text-center text-xs font-medium text-white/60 tracking-widest uppercase">
        &copy; 2026 HealthCarePlus | Authorized Personnel Only
    </footer>
</main>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    const icon = themeToggle.querySelector('i');

    const savedTheme = localStorage.getItem('theme') || 'light';
    body.setAttribute('data-theme', savedTheme);
    if(savedTheme === 'dark') icon.classList.replace('fa-moon', 'fa-sun');

    themeToggle.addEventListener('click', () => {
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    });
</script>
</body>
</html>
