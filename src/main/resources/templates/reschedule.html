<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reschedule Appointment</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 550px;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity:0; transform:translateY(30px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            padding: 35px;
            text-align: center;
            color: white;
        }

        .card-header .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card-body { padding: 35px; }

        .current-info {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 4px solid #f5576c;
        }

        .current-info h3 {
            font-size: 0.85rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .info-row .label { color: #718096; }
        .info-row .value {
            font-weight: 600;
            color: #2d3748;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245,87,108,0.1);
        }

        .btn-reschedule {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-reschedule:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245,87,108,0.4);
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #718096;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .btn-back:hover { color: #f5576c; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="icon">📅</div>
        <h2>Reschedule Appointment</h2>
        <p>Choose a new date and time</p>
    </div>

    <div class="card-body">

        <!-- Current Info -->
        <div class="current-info">
            <h3>📋 Current Appointment</h3>
            <div class="info-row">
                <span class="label">Patient:</span>
                <span class="value"
                      th:text="${appointment.patientName}"></span>
            </div>
            <div class="info-row">
                <span class="label">Doctor:</span>
                <span class="value"
                      th:text="${appointment.doctorName}"></span>
            </div>
            <div class="info-row">
                <span class="label">Current Date:</span>
                <span class="value"
                      th:text="${appointment.appointmentDate}"></span>
            </div>
            <div class="info-row">
                <span class="label">Current Time:</span>
                <span class="value"
                      th:text="${appointment.appointmentTime}"></span>
            </div>
        </div>

        <!-- Reschedule Form -->
        <form th:action="@{/appointments/reschedule/{id}
                         (id=${appointment.id})}"
              method="post" id="rescheduleForm">

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-calendar-alt"></i>
                    New Date
                </label>
                <input type="date"
                       name="newDate"
                       class="form-control"
                       id="newDate"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-clock"></i>
                    New Time
                </label>
                <input type="time"
                       name="newTime"
                       class="form-control"
                       id="newTime"
                       min="08:00"
                       max="17:00"
                       required>
            </div>

            <button type="submit" class="btn-reschedule">
                <i class="fas fa-calendar-check"></i>
                Confirm Reschedule
            </button>
        </form>

        <a th:href="@{/appointments}" class="btn-back">
            ← Back to Appointments
        </a>
    </div>
</div>

<script>
    // Set minimum date to tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('newDate').min =
        tomorrow.toISOString().split('T')[0];

    document.getElementById('rescheduleForm')
        .addEventListener('submit', function(e) {
            const date = document.getElementById('newDate').value;
            const time = document.getElementById('newTime').value;

            if (!date || !time) {
                e.preventDefault();
                alert('Please select both date and time!');
                return;
            }

            const hour = parseInt(time.split(':')[0]);
            if (hour < 8 || hour > 17) {
                e.preventDefault();
                alert('Please select a time between 8 AM and 5 PM');
            }
        });
</script>
</body>
</html>
