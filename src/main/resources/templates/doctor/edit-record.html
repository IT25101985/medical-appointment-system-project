<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Record | Doctor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(30, 41, 59, 1); }
        .input-glow:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="/templates/doctor/records" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-white transition-all">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-2xl font-bold">Edit Medical Notes</h1>
    </div>

    <div class="glass-card rounded-3xl p-8 shadow-2xl">
        <div class="mb-8 border-b border-slate-800 pb-6">
            <h2 class="text-xl font-bold" th:text="${medicalRecord.patient.fullName}">Patient Name</h2>
            <p class="text-sm text-slate-400" th:text="'Original Date: ' + ${#temporals.format(medicalRecord.recordDate, 'MMM dd, yyyy')}"></p>
        </div>

        <form th:action="@{/doctor/record/{id}/update(id=${medicalRecord.id})}" method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wide">Update Diagnosis / Clinical Notes</label>
                <textarea name="diagnosis" required rows="6" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-4 py-3 outline-none input-glow transition-all text-slate-200" th:text="${medicalRecord.diagnosis}"></textarea>
            </div>

            <div class="pt-6 flex justify-end">
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-10 rounded-2xl transition-all shadow-lg shadow-blue-500/20 flex items-center gap-2">
                    <i class="fa-solid fa-save"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
