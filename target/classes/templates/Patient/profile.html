<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <style>
        :root {
            --primary-blue: #005b96;
            --primary-green: #2e7d32;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-green));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: var(--primary-blue);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4b5563;
        }

        input[type=text], input[type=url] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, var(--primary-blue), var(--primary-green));
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover { filter: brightness(1.1); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #6b7280;
            text-decoration: none;
        }

        .profile-preview {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block; margin: 0 auto 15px;
            background: #eee;
            border: 3px solid var(--primary-green);
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<a href="/" style="position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); padding: 8px 16px; border-radius: 8px; color: white; text-decoration: none; font-weight: bold; z-index: 1000; border: 1px solid rgba(255,255,255,0.4);"><i class="fa-solid fa-home"></i> Home</a>

<div class="container">
    <h1>Edit Profile</h1>

    <img th:if="${user.profileImage != null and !user.profileImage.isEmpty()}" th:src="${user.profileImage}" class="profile-preview" alt="Profile Image">
    <img th:unless="${user.profileImage != null and !user.profileImage.isEmpty()}" src="https://ui-avatars.com/api/?name=User&background=random" class="profile-preview" alt="Profile Placeholder">

    <form th:action="@{/patient/profile}" th:object="${user}" method="post">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{fullName}" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" th:field="*{address}" placeholder="e.g. 123 Main St, City">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" th:field="*{phoneNo}" placeholder="e.g. 0777550003">
        </div>

        <div class="form-group">
            <label>Profile Image URL</label>
            <input type="url" th:field="*{profileImage}" placeholder="https://example.com/photo.jpg">
        </div>

        <button type="submit">Save Profile</button>
    </form>

    <a href="/patient/dashboard" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
