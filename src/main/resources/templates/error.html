<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | MediCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#003366,#0056A0);
            min-height:100vh;display:flex;
            align-items:center;justify-content:center;
        }
        .error-card{
            background:white;border-radius:20px;
            padding:60px 50px;text-align:center;
            box-shadow:0 25px 50px rgba(0,0,0,0.2);
            max-width:480px;width:90%;
            animation:slideUp 0.5s ease;
        }
        @keyframes slideUp{
            from{opacity:0;transform:translateY(25px);}
            to{opacity:1;transform:translateY(0);}
        }
        .icon{font-size:5rem;margin-bottom:18px;animation:bounce 1.5s infinite;}
        @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
        h1{font-size:4rem;font-weight:800;color:#003366;line-height:1;}
        h2{font-size:1.2rem;color:#1A1A2E;margin:8px 0 12px;}
        p{color:#94A3B8;font-size:0.9rem;margin-bottom:25px;}
        .btn-home{
            display:inline-block;padding:13px 30px;
            background:linear-gradient(135deg,#FFB800,#FF9500);
            color:#003366;text-decoration:none;border-radius:10px;
            font-weight:700;font-size:0.9rem;transition:all 0.3s;
        }
        .btn-home:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(255,184,0,0.4);}
    </style>
</head>
<body>
<div class="error-card">
    <div class="icon">😕</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/appointments" class="btn-home">🏥 Go to Dashboard</a>
</div>
</body>
</html>
