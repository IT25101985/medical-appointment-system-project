<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Appointment History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
        .timeline-container { position: relative; max-width: 800px; margin: 0 auto; padding-left: 20px; border-left: 3px solid #e5e7eb; }
        .timeline-item { position: relative; margin-bottom: 30px; padding-left: 30px; }
        .timeline-icon {
            position: absolute; left: -39px; top: 0; width: 36px; height: 36px;
            border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center;
        }
        .icon-blue { background: #3b82f6; color: white; }
        .icon-green { background: #10b981; color: white; }
        .icon-red { background: #f43f5e; color: white; }

        .timeline-content { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #f3f4f6; transition: transform 0.3s; }
        .timeline-content:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }

        .home-btn {
            position: fixed; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 12px;
            color: #3b82f6; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; transition: transform 0.3s;
        }
        .home-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8 font-sans pt-20">

<a href="/patient/dashboard" class="home-btn"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
<a href="/" class="home-btn" style="left: 170px;"><i class="fa-solid fa-home"></i> Home</a>

<div class="max-w-4xl mx-auto">
  <div class="mb-10 text-center">
    <h1 class="text-4xl font-bold text-gray-800 tracking-tight">Appointment Timeline</h1>
    <p class="text-gray-500 mt-2">Track your entire medical journey</p>
  </div>

  <!-- Timeline UI -->
  <div class="timeline-container">

    <div th:each="app : ${appointments}" class="timeline-item">
      <div class="timeline-icon" th:classappend="${app.status == 'COMPLETED' ? 'icon-green' : (app.status == 'CANCELLED' ? 'icon-red' : 'icon-blue')}">
        <i th:if="${app.status == 'SCHEDULED'}" class="fa-solid fa-calendar-check"></i>
        <i th:if="${app.status == 'COMPLETED'}" class="fa-solid fa-check-double"></i>
        <i th:if="${app.status == 'CANCELLED'}" class="fa-solid fa-xmark"></i>
      </div>

      <div class="timeline-content">
        <div class="flex justify-between items-start mb-2">
          <div>
            <h3 class="text-lg font-bold text-gray-800" th:text="${app.doctor.name}"></h3>
            <p class="text-sm text-emerald-500 font-medium" th:text="${app.doctor.specialization}"></p>
          </div>
          <span th:classappend="${app.status == 'COMPLETED' ? 'bg-green-100 text-green-700' : (app.status == 'CANCELLED' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700')}"
                class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider"
                th:text="${app.status}">
                    </span>
        </div>

        <p class="text-gray-600 text-sm mb-4"><i class="fa-regular fa-clock mr-1"></i> <span th:text="${#temporals.format(app.appointmentDate, 'MMM dd, yyyy HH:mm')}"></span></p>

        <div class="border-t pt-3 flex flex-wrap justify-between items-center gap-3">
          <span class="text-xs text-gray-400 font-mono">ID: #<span th:text="${app.id}"></span></span>

          <div class="flex items-center gap-4">
            <!-- SHOW PAYMENT Logic -->
            <div th:if="${app.status == 'COMPLETED'}" class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-200">
              <form action="/pay" method="get" class="flex items-center gap-2">
                <input type="hidden" name="amount" value="500.0">
                <select name="type" class="text-xs border rounded p-1 bg-white focus:outline-none">
                  <option value="card">💳 Card (Polymorphism)</option>
                  <option value="cash">💵 Cash (Polymorphism)</option>
                </select>
                <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-blue-700">
                  Pay $500
                </button>
              </form>
            </div>

            <a th:if="${app.status == 'SCHEDULED' or app.status == 'COMPLETED'}"
               th:href="@{/patient/appointment/{id}/pdf(id=${app.id})}"
               class="text-sm font-semibold text-emerald-500 hover:text-indigo-800 flex items-center gap-1">
              <i class="fa-solid fa-file-pdf"></i> Download Summary
            </a>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(appointments)}" class="text-center p-10 bg-slate-900 border border-slate-800 text-white rounded-xl shadow-sm border border-gray-100">
      <div class="text-5xl text-gray-300 mb-4"><i class="fa-solid fa-folder-open"></i></div>
      <h3 class="text-xl font-bold text-gray-700">No History Yet</h3>
      <p class="text-gray-500 mt-2">You don't have any past or upcoming appointments.</p>
    </div>

  </div>
</div>

</body>
</html>
