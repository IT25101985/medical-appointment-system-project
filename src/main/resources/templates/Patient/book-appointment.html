<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCarePlus - Book Appointment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f4f8;
            background-image:
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0, transparent 40%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0, transparent 40%);
            min-height: 100vh;
            color: #1e293b;
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(226, 232, 240, 0.8);
        }

        .premium-card {
            background: white;
            border-radius: 24px;
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item.active {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: #10b981;
            border-radius: 4px 0 0 4px;
        }

        .doctor-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .doctor-card:hover { transform: translateY(-5px); border-color: #10b981; }
        .doctor-card.selected { border-color: #10b981; background: #f0fdf4; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.1); }
    </style>
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/dark-mode.css">
</head>
<body class="flex">

<!-- Sidebar -->
<aside class="w-80 glass-sidebar h-screen p-8 flex flex-col sticky top-0 hidden lg:flex">
    <div class="mb-10">
        <a href="/" class="flex items-center gap-3 mb-8 hover:opacity-85 transition-opacity" style="text-decoration: none;">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-calendar-plus"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">BOOK<span class="text-emerald-600">APPOINTMENT</span></span>
        </a>

        <nav class="space-y-2">
            <a href="/patient/dashboard" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 rounded-xl transition-all">
                <i class="fa-solid fa-grid-2"></i> Dashboard
            </a>
            <a href="/patient/book-appointment" class="nav-item active flex items-center gap-4 px-4 py-3 rounded-xl font-semibold">
                <i class="fa-solid fa-calendar-plus"></i> Book Appointment
            </a>
            <a href="/patient/history" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 rounded-xl transition-all">
                <i class="fa-solid fa-clock-rotate-left"></i> My History
            </a>
            <a href="/patient/profile" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 rounded-xl transition-all">
                <i class="fa-solid fa-user-gear"></i> Profile Settings
            </a>
        </nav>
    </div>

    <div class="mt-auto">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-slate-400 font-bold hover:text-red-500 transition-all">
                <i class="fa-solid fa-power-off"></i> Sign Out
            </button>
        </form>
    </div>
</aside>

<main class="flex-1 p-6 md:p-10">
    <header class="mb-8">
        <h1 class="text-3xl font-extrabold tracking-tight">Schedule a <span class="text-emerald-600">Consultation</span></h1>
        <p class="text-slate-500 mt-1">Book your appointment with our world-class medical specialists</p>
    </header>

    <div class="premium-card p-10 max-w-5xl">
        <form th:action="@{/patient/book-appointment}" th:object="${appointment}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}" />

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
                <div>
                    <h3 class="font-bold mb-6 text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-info-circle text-emerald-600"></i> Contact Details
                    </h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Contact Email</label>
                            <input type="email" th:field="*{contactEmail}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition-all" required/>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Contact Phone</label>
                            <input type="tel" th:field="*{contactPhone}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition-all" required/>
                        </div>
                    </div>
                </div>
                <div>
                    <h3 class="font-bold mb-6 text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-clock text-emerald-600"></i> Preferred Schedule
                    </h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Appointment Date</label>
                            <input type="text" id="datePicker" placeholder="Select a date..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition-all" required>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Available Slots</label>
                            <select id="timeSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition-all" required disabled>
                                <option value="">Please select a date first</option>
                            </select>
                            <input type="hidden" id="appointmentDate" th:field="*{appointmentDate}" />
                        </div>
                    </div>
                </div>
            </div>

            <h3 class="font-bold mb-6 text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-user-doctor text-emerald-600"></i> Select Specialist
            </h3>
            <input type="hidden" name="doctor.id" id="selectedDoctorId" required>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
                <div th:each="doc : ${doctors}" class="doctor-card" th:data-id="${doc.id}" onclick="selectDoctor(this)">
                    <img th:src="${(doc.user != null and doc.user.profileImage != null and doc.user.profileImage.length() > 20) ? (doc.user.profileImage.startsWith('http') or doc.user.profileImage.startsWith('data:') ? doc.user.profileImage : 'data:image/jpeg;base64,' + doc.user.profileImage) : 'https://ui-avatars.com/api/?name=' + doc.name + '&background=random&color=fff'}" class="w-16 h-16 rounded-full mx-auto mb-4 border-2 border-white shadow-sm">
                    <p class="text-sm font-bold text-slate-900" th:text="${doc.name}">Doctor Name</p>
                    <p class="text-[10px] text-emerald-600 font-bold uppercase" th:text="${doc.specialization}">Specialty</p>
                </div>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-emerald-200">
                    Confirm Appointment
                </button>
            </div>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // Initialize Flatpickr
    flatpickr("#datePicker", {
        minDate: "today",
        disable: [date => date.getDay() === 0],
        onChange: (selectedDates, dateStr) => {
            const docId = document.getElementById('selectedDoctorId').value;
            if (docId) fetchSlots(docId, dateStr);
            else alert("Please select a doctor first");
        }
    });

    function selectDoctor(element) {
        document.querySelectorAll('.doctor-card').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById('selectedDoctorId').value = element.getAttribute('data-id');

        // Reset schedule inputs
        document.getElementById('datePicker').value = "";
        document.getElementById('timeSelect').innerHTML = '<option value="">Reselect Date</option>';
        document.getElementById('timeSelect').disabled = true;
    }

    function fetchSlots(doctorId, dateStr) {
        const timeSelect = document.getElementById('timeSelect');
        timeSelect.disabled = true;
        timeSelect.innerHTML = '<option value="">Loading slots...</option>';

        fetch(`/api/doctors/${doctorId}/slots?date=${dateStr}`)
            .then(r => r.json())
            .then(slots => {
                timeSelect.innerHTML = '<option value="">-- Select Time --</option>';
                if (slots.length === 0) {
                    timeSelect.innerHTML = '<option value="">No Slots Available</option>';
                } else {
                    slots.forEach(slot => {
                        const timeFormat = new Date(slot).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        const option = document.createElement('option');
                        option.value = slot;
                        option.textContent = timeFormat;
                        timeSelect.appendChild(option);
                    });
                    timeSelect.disabled = false;
                }
            });
    }

    document.getElementById('timeSelect').addEventListener('change', function() {
        document.getElementById('appointmentDate').value = this.value;
    });
</script>

</body>
</html>
