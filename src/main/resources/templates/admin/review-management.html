<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Review Management | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-gray-800">Patient Reviews</h1>
            <a href="/admin/dashboard" class="bg-white px-4 py-2 rounded-lg shadow text-gray-600 hover:text-blue-600 font-bold">
                <i class="fa-solid fa-arrow-left mr-2"></i> Dashboard
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div th:each="rev : ${reviews}" class="bg-white p-6 rounded-2xl shadow-sm border border-transparent hover:border-blue-200 transition-all">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-800" th:text="${rev.patient.fullName}"></p>
                            <p class="text-xs text-gray-400">Reviewed Dr. <span th:text="${rev.doctor.name}"></span></p>
                        </div>
                    </div>
                    <div class="flex text-amber-400">
                        <i th:each="i : ${#numbers.sequence(1, rev.rating)}" class="fa-solid fa-star text-xs"></i>
                    </div>
                </div>
                <p class="text-gray-600 italic text-sm mb-6" th:text="'&quot;' + ${rev.comments} + '&quot;'"></p>
                
                <div class="flex justify-end">
                    <form th:action="@{/admin/review/{id}/delete(id=${rev.id})}" method="post" onsubmit="return confirm('Remove this review?');">
                        <button class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-100 transition-all">
                            <i class="fa-solid fa-trash mr-1"></i> Remove Review
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(reviews)}" class="text-center p-20">
            <i class="fa-solid fa-comment-slash text-5xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-bold text-gray-400">No reviews yet</h3>
        </div>
    </div>
</body>
</html>
