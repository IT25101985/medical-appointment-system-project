<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>
    <!-- Flatpickr for Modern Date Selection -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb; --accent: #10b981; --glass: rgba(255,255,255,0.85); --bg: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background: #e0f2fe; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .home-btn {
            position: fixed; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 12px;
            color: var(--primary); font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; transition: transform 0.3s;
        }
        .home-btn:hover { transform: scale(1.05); }

        .booking-container {
            background: var(--glass); backdrop-filter: blur(15px); padding: 2.5rem;
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 650px;
        }

        /* Progress Bar */
        .progress-bar-container { width: 100%; background: #e2e8f0; height: 8px; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { width: 33%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.4s ease; }

        .step-content { display: none; animation: fadeIn 0.4s ease; }
        .step-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { color: #1e293b; margin-top: 0; margin-bottom: 20px; text-align: center; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; font-size: 0.9rem; color: #475569; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="file"], select {
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem;
            transition: all 0.3s; box-sizing: border-box; background: white;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        /* Doctor Cards Grid */
        .doctor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .doctor-card {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border: 2px solid transparent; border-radius: 15px;
            padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .doctor-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .doctor-card.selected { border-color: var(--accent); background: white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .doctor-avatar { width: 60px; height: 60px; border-radius: 50%; background: #e0f2fe; color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 10px; position: relative; }

        /* Online Indicator */
        .status-dot { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; background: #10b981; border: 2px solid white; border-radius: 50%; }

        .btn-group { display: flex; justify-content: Space-between; margin-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #e2e8f0; color: #475569; transition: 0.3s; }
        .btn-next { background: var(--primary); color: white; }
        .btn-next:hover { background: #1d4ed8; }
        .btn-prev:hover { background: #cbd5e1; }

        .flatpickr-calendar { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

<a href="/patient/dashboard" class="home-btn"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>

<div class="booking-container">
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>

    <form th:action="@{/patient/book-appointment}" th:object="${appointment}" method="post" enctype="multipart/form-data" id="multiStepForm">

        <!-- STEP 1: Personal Info -->
        <div class="step-content active" id="step1">
            <h2><i class="fa-solid fa-user"></i> Step 1: Personal Details</h2>
            <div class="form-group">
                <label>Contact Email</label>
                <input type="email" th:field="*{contactEmail}" id="contactEmail" required/>
            </div>
            <div class="form-group">
                <label>Contact Phone</label>
                <input type="tel" th:field="*{contactPhone}" id="contactPhone" required/>
            </div>
            <div class="form-group">
                <label>Upload Medical Records (Optional)</label>
                <input type="file" name="medicalRecord" accept=".pdf,.png,.jpg"/>
            </div>
            <div class="btn-group" style="justify-content: flex-end;">
                <button type="button" class="btn btn-next" onclick="nextStep(2)">Next <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <!-- STEP 2: Medical Details & Doctor Cards -->
        <div class="step-content" id="step2">
            <h2><i class="fa-solid fa-user-doctor"></i> Step 2: Choose Doctor</h2>

            <input type="hidden" th:field="*{doctor.id}" id="selectedDoctorId" required>

            <div class="doctor-grid">
                <!-- Iterate over doctors to create cards -->
                <div th:each="doc : ${doctors}" class="doctor-card" th:data-id="${doc.id}" onclick="selectDoctor(this)">
                    <div class="doctor-avatar">
                        <i class="fa-solid fa-user-md"></i>
                        <div class="status-dot"></div>
                    </div>
                    <h4 th:text="${doc.name}" style="margin: 5px 0; color: #1e293b;"></h4>
                    <p th:text="${doc.specialization}" style="margin: 0; font-size: 0.8rem; color: #64748b;"></p>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-prev" onclick="prevStep(1)"><i class="fa-solid fa-chevron-left"></i> Back</button>
                <button type="button" class="btn btn-next" onclick="nextStep(3)">Next <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <!-- STEP 3: Schedule -->
        <div class="step-content" id="step3">
            <h2><i class="fa-solid fa-calendar-check"></i> Step 3: Schedule</h2>

            <div class="form-group">
                <label>Select Date</label>
                <!-- Flatpickr input -->
                <input type="text" id="datePicker" placeholder="Select a date..." required style="background: white;">
            </div>
            <div class="form-group">
                <label>Available Time Slots</label>
                <select id="timeSelect" required disabled>
                    <option value="">Please select a date first</option>
                </select>
            </div>

            <input type="hidden" id="appointmentDate" th:field="*{appointmentDate}" />

            <div class="btn-group">
                <button type="button" class="btn btn-prev" onclick="prevStep(2)"><i class="fa-solid fa-chevron-left"></i> Back</button>
                <button type="submit" class="btn btn-next" id="submitBtn">
                    <span id="btnText">Confirm Appointment</span>
                    <i class="fa-solid fa-spinner fa-spin" id="btnSpinner" style="display: none; margin-left:8px;"></i>
                </button>
            </div>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // Flatpickr initialization
    flatpickr("#datePicker", {
        minDate: "today",
        disable: [
            function(date) { return (date.getDay() === 0); } // Example: disable Sundays
        ],
        onChange: function(selectedDates, dateStr, instance) {
            fetchSlots(document.getElementById('selectedDoctorId').value, dateStr);
        }
    });

    // Multi-Step Navigation
    function nextStep(step) {
        if(step === 2) {
            const email = document.getElementById('contactEmail').value;
            const phone = document.getElementById('contactPhone').value;
            if(!email || !phone) return alert("Please fill contact details");
        }
        if(step === 3) {
            if(!document.getElementById('selectedDoctorId').value) return alert("Please select a doctor");
        }
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        document.getElementById('progressBar').style.width = (step * 33.33) + '%';
    }

    function prevStep(step) {
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        document.getElementById('progressBar').style.width = (step * 33.33) + '%';
    }

    // Doctor Selection
    function selectDoctor(element) {
        document.querySelectorAll('.doctor-card').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById('selectedDoctorId').value = element.getAttribute('data-id');

        // Clear slots if doctor changes
        document.getElementById('timeSelect').innerHTML = '<option value="">Reselect Date</option>';
        document.getElementById('timeSelect').disabled = true;
        document.getElementById('datePicker').value = ""; // Reset date
    }

    // Fetch Slots Dynamic Logic
    function fetchSlots(doctorId, dateStr) {
        const timeSelect = document.getElementById('timeSelect');
        if (doctorId && dateStr) {
            timeSelect.disabled = true;
            timeSelect.innerHTML = '<option value="">Loading...</option>';

            fetch(`/api/doctors/${doctorId}/slots?date=${dateStr}`)
                .then(r => r.json())
                .then(slots => {
                    timeSelect.innerHTML = '<option value="">-- Select Time --</option>';
                    if (slots.length === 0) {
                        timeSelect.innerHTML = '<option value="">Fully Booked</option>';
                    } else {
                        slots.forEach(slot => {
                            const timeFormat = new Date(slot).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            const option = document.createElement('option');
                            option.value = slot;
                            option.textContent = timeFormat;
                            timeSelect.appendChild(option);
                        });
                        timeSelect.disabled = false;
                    }
                }).catch(e => { timeSelect.innerHTML = '<option value="">Error Data</option>'; });
        }
    }

    document.getElementById('timeSelect').addEventListener('change', function() {
        document.getElementById('appointmentDate').value = this.value;
    });

    document.getElementById('multiStepForm').addEventListener('submit', function(e) {
        if(!document.getElementById('appointmentDate').value) {
            e.preventDefault();
            alert("Please select an available time slot");
            return;
        }
        document.getElementById('btnText').textContent = "Booking...";
        document.getElementById('btnSpinner').style.display = "inline-block";
        document.getElementById('submitBtn').disabled = true;
    });
</script>
</body>
</html>
