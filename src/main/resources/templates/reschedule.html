<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Reschedule | MediCare</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --primary: #003366;
            --accent: #0077CC;
            --gold: #FFB800;
            --bg: #F4F6F9;
            --white: #FFF;
            --border: #E2E8F0;
            --text: #1A1A2E;
            --muted: #94A3B8;
        }
        * { margin:0;padding:0;box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:var(--bg);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .card {
            background:var(--white);
            border-radius:20px;
            width:100%;max-width:520px;
            box-shadow:0 20px 50px rgba(0,0,0,0.1);
            overflow:hidden;
            animation:slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from{opacity:0;transform:translateY(25px);}
            to{opacity:1;transform:translateY(0);}
        }
        .card-top {
            background:linear-gradient(
                135deg,var(--gold),#FF9500);
            padding:35px;text-align:center;color:var(--primary);
        }
        .card-top .icon{font-size:2.5rem;margin-bottom:10px;}
        .card-top h2{font-size:1.4rem;font-weight:800;}
        .card-top p{font-size:0.85rem;opacity:0.8;}

        .card-body{padding:30px 35px;}

        .info-box {
            background:var(--bg);border-radius:12px;
            padding:18px;margin-bottom:22px;
            border-left:4px solid var(--gold);
        }
        .info-box h3 {
            font-size:0.8rem;font-weight:600;
            color:var(--muted);text-transform:uppercase;
            letter-spacing:1px;margin-bottom:10px;
        }
        .info-row {
            display:flex;justify-content:space-between;
            margin-bottom:6px;font-size:0.88rem;
        }
        .info-row .lbl{color:var(--muted);}
        .info-row .val{font-weight:600;color:var(--text);}

        .form-group{margin-bottom:18px;}
        .form-label {
            font-size:0.82rem;font-weight:600;
            color:#4A5568;margin-bottom:6px;display:block;
        }
        .form-control {
            width:100%;padding:11px 14px;
            border:2px solid var(--border);border-radius:10px;
            font-family:'Inter',sans-serif;font-size:0.88rem;
            outline:none;transition:all 0.3s;
        }
        .form-control:focus {
            border-color:var(--accent);
            box-shadow:0 0 0 3px rgba(0,119,204,0.1);
        }
        .btn-reschedule {
            width:100%;padding:13px;
            background:linear-gradient(
                135deg,var(--gold),#FF9500);
            color:var(--primary);border:none;border-radius:10px;
            font-family:'Inter',sans-serif;font-size:0.95rem;
            font-weight:700;cursor:pointer;transition:all 0.3s;
        }
        .btn-reschedule:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(255,184,0,0.35);
        }
        .back-link {
            display:block;text-align:center;margin-top:15px;
            color:var(--accent);text-decoration:none;
            font-size:0.88rem;font-weight:500;
        }
        .back-link:hover{text-decoration:underline;}

        @media(max-width:500px) {
            .card-body{padding:20px;}
            .card-top{padding:25px;}
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-top">
        <div class="icon">📅</div>
        <h2>Reschedule Appointment</h2>
        <p>Choose a new date and time</p>
    </div>
    <div class="card-body">
        <div class="info-box">
            <h3>📋 Current Details</h3>
            <div class="info-row">
                <span class="lbl">Patient:</span>
                <span class="val"
                      th:text="${appointment.patientName}"></span>
            </div>
            <div class="info-row">
                <span class="lbl">Doctor:</span>
                <span class="val"
                      th:text="${appointment.doctorName}"></span>
            </div>
            <div class="info-row">
                <span class="lbl">Date:</span>
                <span class="val"
                      th:text="${appointment.appointmentDate}">
                </span>
            </div>
            <div class="info-row">
                <span class="lbl">Time:</span>
                <span class="val"
                      th:text="${appointment.appointmentTime}">
                </span>
            </div>
        </div>

        <form th:action="@{/appointments/reschedule/
                         {id}(id=${appointment.id})}"
              method="post">
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-calendar-alt"></i>
                    New Date
                </label>
                <input type="date" name="newDate"
                       class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-clock"></i>
                    New Time
                </label>
                <input type="time" name="newTime"
                       class="form-control"
                       min="08:00" max="17:00" required>
            </div>
            <button type="submit" class="btn-reschedule">
                <i class="fas fa-calendar-check"></i>
                Confirm Reschedule
            </button>
        </form>
        <a th:href="@{/appointments}" class="back-link">
            ← Back to Dashboard
        </a>
    </div>
</div>
<script>
    const d = new Date();
    d.setDate(d.getDate()+1);
    document.querySelector('input[name=newDate]').min =
        d.toISOString().split('T')[0];
</script>
</body>
</html>
