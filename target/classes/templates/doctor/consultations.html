<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultations | HEALTHCAREPLUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; height: 100vh; overflow: hidden; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-right: 1px solid rgba(226, 232, 240, 0.8); }
        .nav-item { transition: all 0.3s ease; position: relative; }
        .nav-item.active::after { content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 4px; background: #3b82f6; border-radius: 4px 0 0 4px; }
        .modern-home-btn { position: fixed; top: 20px; right: 20px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 10px 24px; border-radius: 30px; text-decoration: none; font-weight: 600; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .modern-home-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); color: white; }
    </style>
</head>
<body class="flex">
<a href="/" class="modern-home-btn"><i class="fa-solid fa-house-chimney-medical"></i> Home</a>

<aside class="w-72 glass-sidebar h-screen p-8 flex flex-col justify-between hidden md:flex">
    <div>
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fa-solid fa-stethoscope"></i>
            </div>
            <span class="text-xl font-bold text-white tracking-tight">HEALTHCARE<span class="font-bold text-emerald-500">PLUS</span></span>
        </div>

        <nav class="space-y-2">
            <a href="/doctor/dashboard" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-emerald-500 rounded-xl transition-all">
                <i class="fa-solid fa-house-user"></i> Overview
            </a>
            <a href="/doctor/appointments" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-emerald-500 rounded-xl transition-all">
                <i class="fa-solid fa-calendar-check"></i> Appointments
            </a>
            <a href="/doctor/records" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-emerald-500 rounded-xl transition-all">
                <i class="fa-solid fa-file-medical"></i> Patient Records
            </a>
            <a href="/doctor/consultations" class="nav-item active flex items-center gap-4 px-4 py-3 bg-blue-50 text-emerald-500 rounded-xl font-semibold">
                <i class="fa-solid fa-comment-dots"></i> Consultations
            </a>
        </nav>
    </div>

    <div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full flex items-center justify-center gap-2 px-4 py-3 border-2 border-slate-100 text-slate-400 font-bold rounded-xl hover:border-red-100 hover:text-red-500 transition-all">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
            </button>
        </form>
    </div>
</aside>

<main class="flex-1 p-8 md:p-12 overflow-y-auto flex items-center justify-center">
    <div class="text-center">
        <i class="fa-solid fa-comment-dots text-6xl text-slate-200 mb-6 block"></i>
        <h2 class="text-3xl font-bold text-white mb-2">Consultation Notes</h2>
        <p class="text-slate-300 max-w-md mx-auto">This module is under development. You will soon be able to manage your consultation transcripts here.</p>
    </div>
</main>
</body>
</html>
