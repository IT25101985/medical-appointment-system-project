<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{appointmentschedule/fragments/header
                   :: head('Appointments - MediCare')}">
</head>

<body class="bg-light" style="padding-top:80px;">

<nav th:replace="~{appointmentschedule/fragments/header
                  :: navbar}">
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between
                align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-dark mb-1">
        <i class="fas fa-calendar-check
                          text-primary me-2"></i>
        Appointments
      </h2>
      <p class="text-muted mb-0"
         th:if="${filterInfo}"
         th:text="'Filtered by: ' + ${filterInfo}">
      </p>
    </div>
    <a href="/appointmentschedule/appointments/book"
       class="btn btn-primary shadow-sm">
      <i class="fas fa-plus-circle me-2"></i>
      Book New
    </a>
  </div>

  <!-- Alerts -->
  <div th:if="${successMessage}"
       class="alert alert-success
                alert-dismissible fade show"
       role="alert">
    <i class="fas fa-check-circle me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert">
    </button>
  </div>

  <div th:if="${errorMessage}"
       class="alert alert-danger
                alert-dismissible fade show"
       role="alert">
    <i class="fas fa-exclamation-circle me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert">
    </button>
  </div>

  <!-- Filter Bar -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body py-3">
      <form method="get"
            action="/appointmentschedule/appointments"
            class="row g-3 align-items-end">

        <!-- Search -->
        <div class="col-md-4">
          <label class="form-label
                                  small fw-semibold">
            Search
          </label>
          <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="fas fa-search"></i>
                        </span>
            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Name, phone, reference..."
                   th:value="${searchKeyword}">
          </div>
        </div>

        <!-- Status -->
        <div class="col-md-3">
          <label class="form-label
                                  small fw-semibold">
            Status
          </label>
          <select name="status"
                  class="form-select">
            <option value="">All Statuses</option>
            <option th:each="s : ${statuses}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${selectedStatus != null
                                              and selectedStatus
                                              == s.name()}">
            </option>
          </select>
        </div>

        <!-- Date -->
        <div class="col-md-3">
          <label class="form-label
                                  small fw-semibold">
            Date
          </label>
          <input type="date"
                 name="date"
                 class="form-control"
                 th:value="${selectedDate}">
        </div>

        <!-- Buttons -->
        <div class="col-md-2">
          <div class="d-flex gap-2">
            <button type="submit"
                    class="btn btn-primary flex-grow-1">
              <i class="fas fa-filter me-1"></i>
              Filter
            </button>
            <a href="/appointmentschedule/appointments"
               class="btn btn-outline-secondary">
              <i class="fas fa-redo"></i>
            </a>
          </div>
        </div>

      </form>
    </div>
  </div>

  <!-- Count -->
  <div class="d-flex justify-content-between
                align-items-center mb-3">
        <span class="text-muted">
            Showing
            <strong th:text="${#lists.size(appointments)}">
                0
            </strong>
            appointments
        </span>
  </div>

  <!-- Table -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover
                              align-middle mb-0">
          <thead class="table-light">
          <tr>
            <th class="ps-4">Reference</th>
            <th>Token</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Date & Time</th>
            <th>Type</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="apt : ${appointments}"
              class="appointment-row">

            <!-- Reference -->
            <td class="ps-4">
                                <span class="fw-semibold
                                             text-primary"
                                      th:text="${apt.appointmentRef}">
                                </span>
            </td>

            <!-- Token -->
            <td>
                                <span th:if="${apt.tokenNumber != null}"
                                      class="badge bg-primary
                                             rounded-pill"
                                      th:text="'#' + ${apt.tokenNumber}">
                                </span>
              <span th:if="${apt.tokenNumber == null}"
                    class="text-muted">
                                    -
                                </span>
            </td>

            <!-- Patient -->
            <td>
              <div class="d-flex align-items-center">
                <div class="avatar-circle
                                                bg-primary
                                                bg-opacity-10
                                                text-primary me-2">
                                        <span th:text="${#strings.substring(
                                                         apt.patientName,
                                                         0, 1)}">
                                        </span>
                </div>
                <div>
                  <div class="fw-semibold"
                       th:text="${apt.patientName}">
                  </div>
                  <small class="text-muted"
                         th:text="${apt.patientPhone}">
                  </small>
                </div>
              </div>
            </td>

            <!-- Doctor -->
            <td>
              <div th:text="${apt.doctorName}"></div>
              <small class="text-muted"
                     th:text="${apt.specialization}">
              </small>
            </td>

            <!-- Date & Time -->
            <td>
              <div th:text="${apt.getFormattedDate()}">
              </div>
              <small class="text-muted"
                     th:text="${apt.getFormattedTime()}">
              </small>
            </td>

            <!-- Type -->
            <td>
                                <span class="badge bg-light text-dark"
                                      th:text="${apt.appointmentType}">
                                </span>
            </td>

            <!-- Status -->
            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="'bg-'
                                       + ${apt.getStatusBadgeClass()}"
                                      th:text="${apt.status}">
                                </span>
            </td>

            <!-- Actions -->
            <td class="text-center">
              <div class="btn-group btn-group-sm">

                <!-- View -->
                <a th:href="@{'/appointmentschedule/appointments/view/'
                                                + ${apt.id}}"
                   class="btn btn-outline-primary"
                   title="View">
                  <i class="fas fa-eye"></i>
                </a>

                <!-- Reschedule -->
                <a th:if="${apt.isReschedulable()}"
                   th:href="@{'/appointmentschedule/appointments/reschedule/'
                                                + ${apt.id}}"
                   class="btn btn-outline-warning"
                   title="Reschedule">
                  <i class="fas fa-calendar-alt"></i>
                </a>

                <!-- Cancel -->
                <a th:if="${apt.isCancellable()}"
                   th:href="@{'/appointmentschedule/appointments/cancel/'
                                                + ${apt.id}}"
                   class="btn btn-outline-danger"
                   title="Cancel"
                   onclick="return confirm(
                                           'Cancel this appointment?')">
                  <i class="fas fa-times"></i>
                </a>

                <!-- Delete -->
                <a th:href="@{'/appointmentschedule/appointments/delete/'
                                                + ${apt.id}}"
                   class="btn btn-outline-dark"
                   title="Delete"
                   onclick="return confirm(
                                           'Permanently delete? Cannot undo!')">
                  <i class="fas fa-trash"></i>
                </a>

              </div>
            </td>
          </tr>

          <!-- Empty -->
          <tr th:if="${#lists.isEmpty(appointments)}">
            <td colspan="8"
                class="text-center py-5">
              <i class="fas fa-inbox fa-4x
                                          text-muted mb-3
                                          d-block opacity-25"></i>
              <h5 class="text-muted">
                No appointments found
              </h5>
              <p class="text-muted">
                Try adjusting your filters
              </p>
              <a href="/appointmentschedule/appointments/book"
                 class="btn btn-primary">
                <i class="fas fa-plus-circle me-2"></i>
                Book Appointment
              </a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<footer th:replace="~{appointmentschedule/fragments/footer
                    :: footer}">
</footer>

<div th:replace="~{appointmentschedule/fragments/header
                  :: scripts}">
</div>

</body>
</html>
