<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare Plus — Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/dark-mode.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg1: #eff6ff;
          --bg2: #f0fdfa;
          --glass: rgba(255,255,255,0.7);
          --glass-border: rgba(148,163,184,0.3);
          --text: #0f172a;
          --text-muted: #64748b;
          --blue: #3b82f6;
          --teal: #14b8a6;
          --glow: rgba(59,130,246,0.25);
          --input-bg: rgba(255,255,255,0.8);
        }

        .dark-mode, [data-theme='dark'] {
          --bg1: #0f172a;
          --bg2: #1e293b;
          --glass: rgba(255,255,255,0.06);
          --glass-border: rgba(255,255,255,0.12);
          --text: #f1f5f9;
          --text-muted: #94a3b8;
          --glow: rgba(59,130,246,0.4);
          --input-bg: rgba(255,255,255,0.05);
        }

        body {
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
          transition: background 0.5s ease;
          position: relative;
          overflow: hidden;
        }

        /* ── Animated blobs ── */
        .blob {
          position: fixed;
          border-radius: 50%;
          filter: blur(80px);
          opacity: 0.18;
          animation: float 8s ease-in-out infinite;
          pointer-events: none;
        }
        .blob-1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: #14b8a6; bottom: -100px; right: -80px; animation-delay: 3s; }
        .blob-3 { width: 300px; height: 300px; background: #818cf8; top: 40%; left: 30%; animation-delay: 1.5s; }
        @keyframes float {
          0%, 100% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-30px) scale(1.05); }
        }

        /* ── Main card ── */
        .login-card {
          position: relative;
          z-index: 10;
          width: 100%;
          max-width: 440px;
          background: var(--glass);
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
          border: 1px solid var(--glass-border);
          border-radius: 28px;
          padding: 44px 40px;
          box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
          animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(30px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo ── */
        .logo-wrap {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 32px;
        }
        .logo-icon {
          width: 48px; height: 48px;
          background: linear-gradient(135deg, #2563eb, #14b8a6);
          border-radius: 16px;
          display: flex; align-items: center; justify-content: center;
          font-size: 20px; color: white;
          box-shadow: 0 8px 20px rgba(59,130,246,0.4);
          animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
          0%,100% { box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
          50%      { box-shadow: 0 8px 30px rgba(59,130,246,0.7); }
        }
        .logo-text { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .logo-text span { color: #14b8a6; }

        /* ── Heading ── */
        .card-title { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 6px; }
        .card-sub { font-size: 13px; color: var(--text-muted); font-weight: 400; margin-bottom: 28px; }

        /* ── Alert boxes ── */
        .alert {
          display: flex; align-items: center; gap: 10px;
          padding: 12px 16px; border-radius: 14px;
          font-size: 13px; font-weight: 500;
          margin-bottom: 20px;
          animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
        .alert-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .alert-success { background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.25); color: #5eead4; }

        /* ── Input groups ── */
        .field-group { margin-bottom: 18px; }
        .field-label {
          display: block;
          font-size: 11px; font-weight: 700;
          text-transform: uppercase; letter-spacing: 0.08em;
          color: var(--text-muted);
          margin-bottom: 8px;
          transition: color 0.2s;
        }
        .field-wrap {
          position: relative;
          display: flex; align-items: center;
        }
        .field-icon {
          position: absolute; left: 16px;
          color: var(--text-muted);
          font-size: 15px;
          transition: color 0.3s;
          pointer-events: none;
        }
        .field-input {
          width: 100%;
          background: var(--input-bg);
          border: 1.5px solid var(--glass-border);
          border-radius: 14px;
          padding: 14px 16px 14px 46px;
          font-size: 14px; font-weight: 500;
          color: var(--text);
          outline: none;
          transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
          font-family: 'Inter', sans-serif;
        }
        .field-input::placeholder { color: var(--text-muted); font-weight: 400; }
        .field-input:focus {
          border-color: #3b82f6;
          box-shadow: 0 0 0 4px var(--glow);
          background: rgba(59,130,246,0.06);
        }
        .field-input:focus ~ .field-icon,
        .field-wrap:focus-within .field-icon { color: #3b82f6; }
        .field-group:focus-within .field-label { color: #3b82f6; }

        /* Eye toggle */
        .eye-btn {
          position: absolute; right: 14px;
          background: none; border: none; cursor: pointer;
          color: var(--text-muted); font-size: 15px;
          padding: 4px; transition: color 0.2s;
        }
        .eye-btn:hover { color: var(--blue); }

        /* ── Remember me ── */
        .remember-row {
          display: flex; align-items: center; justify-content: space-between;
          margin-bottom: 24px;
        }
        .check-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .check-label input[type=checkbox] { accent-color: #3b82f6; width: 16px; height: 16px; cursor: pointer; }
        .check-label span { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .forgot-link { font-size: 13px; font-weight: 600; color: #3b82f6; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }

        /* ── Submit button ── */
        .btn-login {
          width: 100%; padding: 15px;
          background: linear-gradient(135deg, #2563eb 0%, #14b8a6 100%);
          border: none; border-radius: 14px;
          font-family: 'Inter', sans-serif;
          font-size: 15px; font-weight: 700;
          color: white; cursor: pointer;
          letter-spacing: 0.01em;
          position: relative; overflow: hidden;
          transition: transform 0.2s, box-shadow 0.2s;
          box-shadow: 0 6px 20px rgba(59,130,246,0.35);
        }
        .btn-login::before {
          content: '';
          position: absolute; inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
          opacity: 0; transition: opacity 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(59,130,246,0.45); }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:active { transform: translateY(0); }

        /* Loading state */
        .btn-login.loading .btn-text { opacity: 0; }
        .btn-login .btn-spinner {
          position: absolute; inset: 0;
          display: flex; align-items: center; justify-content: center;
          opacity: 0; transition: opacity 0.2s;
        }
        .btn-login.loading .btn-spinner { opacity: 1; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }


        /* ── Register link ── */
        .register-text {
          text-align: center; margin-top: 22px;
          font-size: 13px; color: var(--text-muted);
        }
        .register-text a { color: #14b8a6; font-weight: 700; text-decoration: none; }
        .register-text a:hover { text-decoration: underline; }

        /* ── Time badge ── */
        .time-badge {
          position: fixed; top: 20px; right: 20px; z-index: 100;
          display: flex; align-items: center; gap: 8px;
          background: var(--glass);
          backdrop-filter: blur(10px);
          border: 1px solid var(--glass-border);
          border-radius: 14px; padding: 8px 16px;
          font-size: 12px; font-weight: 600; color: var(--text-muted);
          cursor: pointer; transition: all 0.3s;
        }
        .time-badge:hover { border-color: #3b82f6; color: var(--blue); }
        .time-indicator { width: 8px; height: 8px; border-radius: 50%; }

        /* ── Home button ── */
        .home-btn {
          position: fixed; top: 20px; left: 20px; z-index: 100;
          display: flex; align-items: center; gap: 8px;
          background: var(--glass);
          backdrop-filter: blur(10px);
          border: 1px solid var(--glass-border);
          border-radius: 14px; padding: 10px 18px;
          font-size: 13px; font-weight: 600; color: var(--text);
          text-decoration: none; transition: all 0.3s;
        }
        .home-btn:hover { border-color: #14b8a6; color: #14b8a6; transform: translateX(-3px); }

        /* Skeleton shimmer (for demo) */
        @keyframes shimmer {
          0% { background-position: -400px 0; }
          100% { background-position: 400px 0; }
        }
        .shimmer {
          background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.03) 75%);
          background-size: 400px 100%;
          animation: shimmer 1.5s infinite;
        }
    </style>
</head>
<body id="body">

<!-- Animated blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Home button -->
<a href="/" class="home-btn">
    <i class="fa-solid fa-house-medical"></i>
    <span>Portal Home</span>
</a>

<!-- Time / Theme badge -->
<div class="time-badge" id="themeBadge" onclick="toggleGlobalTheme()" title="Toggle Light/Dark mode">
    <div class="time-indicator" id="timeIndicator"></div>
    <span id="timeBadgeText">--:--</span>
    <i class="fa-solid fa-circle-half-stroke"></i>
</div>

<!-- Login Card -->
<div class="login-card">

    <!-- Logo -->
    <a href="/" class="logo-wrap" style="text-decoration: none;">
        <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
        <div>
            <div class="logo-text">HealthCare<span>Plus</span></div>
            <p style="font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-top:1px">Patient Portal</p>
        </div>
    </a>

    <h1 class="card-title">Welcome back 👋</h1>
    <p class="card-sub">Sign in to access your health dashboard</p>

    <!-- Error / Success Messages -->
    <div th:if="${param.error}" class="alert alert-error">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>Incorrect username or password. Please try again.</span>
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        <i class="fa-solid fa-circle-check"></i>
        <span>You've been securely signed out.</span>
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
        <i class="fa-solid fa-user-check"></i>
        <span>Account created! Please sign in to continue.</span>
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post" id="loginForm" novalidate>

        <!-- Username -->
        <div class="field-group">
            <label class="field-label" for="username">Username</label>
            <div class="field-wrap">
                <i class="fa-solid fa-user field-icon"></i>
                <input type="text" id="username" name="username" class="field-input"
                       placeholder="Enter your username" required autocomplete="username">
            </div>
        </div>

        <!-- Password -->
        <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="field-wrap">
                <i class="fa-solid fa-lock field-icon"></i>
                <input type="password" id="password" name="password" class="field-input"
                       placeholder="Enter your password" required autocomplete="current-password"
                       style="padding-right: 46px;">
                <button type="button" class="eye-btn" onclick="togglePwd()" id="eyeBtn" title="Show/hide password">
                    <i class="fa-regular fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <!-- Remember me + Forgot -->
        <div class="remember-row">
            <label class="check-label">
                <input type="checkbox" name="remember-me">
                <span>Keep me signed in</span>
            </label>
            <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="loginBtn">
            <span class="btn-text"><i class="fa-solid fa-right-to-bracket mr-2"></i>Sign In Securely</span>
            <div class="btn-spinner"><div class="spinner"></div></div>
        </button>
    </form>



    <!-- Register -->
    <p class="register-text">
        New to HealthCarePlus? <a href="/register">Create free account →</a>
    </p>
</div>

<script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      if(document.getElementById('timeBadgeText')) document.getElementById('timeBadgeText').textContent = h + ':' + m;

      // Update indicator color based on theme
      const indicator = document.getElementById('timeIndicator');
      if(indicator) {
          const isDark = document.documentElement.classList.contains('dark-mode');
          indicator.style.background = isDark ? '#818cf8' : '#f59e0b';
      }
    }

    updateClock();
    setInterval(updateClock, 10000);

    /* ── Password toggle ── */
    function togglePwd() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'fa-regular fa-eye';
      }
    }

    /* ── Form: loading state ── */
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      const btn = document.getElementById('loginBtn');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      if (!u || !p) return;
      btn.classList.add('loading');
      btn.style.pointerEvents = 'none';
      // Re-enable after 5s (fallback if server doesn't respond)
      setTimeout(() => { btn.classList.remove('loading'); btn.style.pointerEvents = 'auto'; }, 5000);
    });


    /* ── Input micro-interactions ── */
    document.querySelectorAll('.field-input').forEach(input => {
      input.addEventListener('focus', () => {
        input.closest('.field-wrap').style.transform = 'scale(1.01)';
      });
      input.addEventListener('blur', () => {
        input.closest('.field-wrap').style.transform = '';
      });
    });
</script>
</body>
</html>
