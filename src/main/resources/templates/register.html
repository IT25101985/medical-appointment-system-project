<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare Plus — Join Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/dark-mode.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg1: #eff6ff;
          --bg2: #f0fdfa;
          --glass: rgba(255,255,255,0.7);
          --glass-border: rgba(148,163,184,0.3);
          --text: #0f172a;
          --text-muted: #64748b;
          --blue: #3b82f6;
          --teal: #14b8a6;
          --glow: rgba(59,130,246,0.25);
          --input-bg: rgba(255,255,255,0.8);
        }

        .dark-mode, [data-theme='dark'] {
          --bg1: #0f172a;
          --bg2: #1e293b;
          --glass: rgba(255,255,255,0.06);
          --glass-border: rgba(255,255,255,0.12);
          --text: #f1f5f9;
          --text-muted: #94a3b8;
          --glow: rgba(59,130,246,0.4);
          --input-bg: rgba(255,255,255,0.05);
        }

        body {
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px 20px;
          transition: background 0.5s ease;
          position: relative;
          overflow-x: hidden;
        }

        /* Animated blobs */
        .blob {
          position: fixed;
          border-radius: 50%;
          filter: blur(80px);
          opacity: 0.18;
          animation: float 8s ease-in-out infinite;
          pointer-events: none;
        }
        .blob-1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: #14b8a6; bottom: -100px; right: -80px; animation-delay: 3s; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }

        /* Card */
        .register-card {
          position: relative;
          z-index: 10;
          width: 100%;
          max-width: 500px;
          background: var(--glass);
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
          border: 1px solid var(--glass-border);
          border-radius: 32px;
          padding: 40px;
          box-shadow: 0 30px 60px rgba(0,0,0,0.3);
          animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Logo */
        .logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
        .logo-icon {
          width: 44px; height: 44px;
          background: linear-gradient(135deg, #2563eb, #14b8a6);
          border-radius: 14px;
          display: flex; align-items: center; justify-content: center;
          font-size: 18px; color: white;
          box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }
        .logo-text { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .logo-text span { color: #14b8a6; }

        .card-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
        .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; }

        /* Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }

        .field-group { margin-bottom: 16px; }
        .field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .field-wrap { position: relative; }
        .field-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
        .field-input {
          width: 100%;
          background: var(--input-bg);
          border: 1.5px solid var(--glass-border);
          border-radius: 14px;
          padding: 13px 16px 13px 44px;
          font-size: 14px; color: var(--text);
          outline: none; transition: all 0.3s;
          font-family: 'Inter', sans-serif;
        }
        .field-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px var(--glow); background: rgba(59,130,246,0.06); }

        /* Submit */
        .btn-register {
          width: 100%; padding: 15px;
          background: linear-gradient(135deg, #2563eb 0%, #14b8a6 100%);
          border: none; border-radius: 14px;
          font-size: 15px; font-weight: 700; color: white; cursor: pointer;
          box-shadow: 0 6px 20px rgba(59,130,246,0.35);
          transition: all 0.3s;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(59,130,246,0.45); }

        .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
        .login-link a { color: #14b8a6; font-weight: 700; text-decoration: none; }

        /* Badge */
        .theme-badge {
          position: fixed; top: 20px; right: 20px; z-index: 100;
          background: var(--glass); backdrop-filter: blur(10px);
          border: 1px solid var(--glass-border);
          border-radius: 12px; padding: 8px 15px;
          font-size: 12px; font-weight: 600; color: var(--text-muted);
          cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        .home-btn {
          position: fixed; top: 20px; left: 20px; z-index: 100;
          background: var(--glass); backdrop-filter: blur(10px);
          border: 1px solid var(--glass-border);
          border-radius: 12px; padding: 10px 18px;
          font-size: 13px; font-weight: 600; color: var(--text);
          text-decoration: none; display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body id="body">

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<a href="/" class="home-btn">
    <i class="fa-solid fa-house-medical"></i>
    <span>Portal Home</span>
</a>

<div class="theme-badge" onclick="toggleGlobalTheme()">
    <span id="themeText">Switch Theme</span>
    <i class="fa-solid fa-circle-half-stroke"></i>
</div>

<div class="register-card">
    <div class="logo-wrap">
        <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="logo-text">HealthCare<span>Plus</span></div>
    </div>

    <h1 class="card-title">Create Account</h1>
    <p class="card-sub">Join thousands of patients getting better care</p>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="form-grid">
            <!-- Full Name -->
            <div class="field-group full-width">
                <label class="field-label">Full Name</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-id-card field-icon"></i>
                    <input type="text" th:field="*{fullName}" class="field-input" placeholder="e.g. John Doe" required>
                </div>
            </div>

            <!-- Email -->
            <div class="field-group">
                <label class="field-label">Email Address</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-envelope field-icon"></i>
                    <input type="email" th:field="*{email}" class="field-input" placeholder="name@email.com" required>
                </div>
            </div>

            <!-- Phone -->
            <div class="field-group">
                <label class="field-label">Phone Number</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-phone field-icon"></i>
                    <input type="tel" th:field="*{phoneNo}" class="field-input" placeholder="+94..." required>
                </div>
            </div>

            <!-- Username -->
            <div class="field-group">
                <label class="field-label">Username</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-user field-icon"></i>
                    <input type="text" th:field="*{username}" class="field-input" placeholder="Choose username" required>
                </div>
            </div>

            <!-- Password -->
            <div class="field-group">
                <label class="field-label">Password</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" th:field="*{password}" class="field-input" placeholder="••••••••" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-register">
            <i class="fa-solid fa-user-plus mr-2"></i> Create Account
        </button>
    </form>

    <p class="login-link">
        Already have an account? <a href="/login">Login here →</a>
    </p>
</div>

<script>
    // Global theme handling is in theme.js
</script>
</body>
</html>
