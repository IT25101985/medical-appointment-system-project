<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Appointment | MediCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/appointment.css}" rel="stylesheet">
</head>

<body class="bg-animated"
      style="display:flex;
             align-items:center;
             justify-content:center;
             min-height:100vh;
             padding:30px;">

<div class="particles-container" id="particlesContainer"></div>
<div class="glow-orb glow-orb-blue"></div>
<div class="glow-orb glow-orb-purple"></div>

<div class="card-glass" style="max-width:650px; width:100%; z-index:10;"
     th:if="${appointment}">

    <!-- Header -->
    <div class="card-header-grad">
        <div class="header-icon-circle">
            <i class="fas fa-calendar-check"></i>
        </div>
        <h2 style="font-size:1.7rem;">Appointment Details</h2>
        <p>
            ID: #<span th:text="${appointment.id}">1</span>
            &nbsp;|&nbsp;
            <span th:text="${appointment.status}">Status</span>
        </p>
    </div>

    <!-- Body -->
    <div style="padding:35px;">

        <!-- Status Banner -->
        <div style="text-align:center; margin-bottom:28px;">
                <span th:switch="${appointment.status}">
                    <span th:case="'PENDING'"
                          class="badge-pending"
                          style="font-size:0.9rem; padding:8px 22px;">
                        ⏳ PENDING CONFIRMATION
                    </span>
                    <span th:case="'CONFIRMED'"
                          class="badge-confirmed"
                          style="font-size:0.9rem; padding:8px 22px;">
                        ✅ CONFIRMED
                    </span>
                    <span th:case="'CANCELLED'"
                          class="badge-cancelled"
                          style="font-size:0.9rem; padding:8px 22px;">
                        ❌ CANCELLED
                    </span>
                    <span th:case="'COMPLETED'"
                          class="badge-completed"
                          style="font-size:0.9rem; padding:8px 22px;">
                        ✔ COMPLETED
                    </span>
                </span>
        </div>

        <!-- Info Rows -->
        <div th:each="nothing : ${#lists.toList({1})}"
             style="background:#f8f9ff;
                        border-radius:16px;
                        padding:5px 0;">

            <!-- Patient -->
            <div style="display:flex; align-items:center;
                             gap:14px; padding:13px 20px;
                             border-bottom:1px solid #f0f0f0;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px;
                                 display:flex; align-items:center;
                                 justify-content:center;
                                 color:white; font-size:0.9rem;
                                 flex-shrink:0;">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Patient Name</div>
                    <div style="font-weight:700; color:#333;"
                         th:text="${appointment.patientName}">Name</div>
                </div>
            </div>

            <!-- Email -->
            <div style="display:flex; align-items:center;
                             gap:14px; padding:13px 20px;
                             border-bottom:1px solid #f0f0f0;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px; display:flex;
                                 align-items:center; justify-content:center;
                                 color:white; font-size:0.9rem; flex-shrink:0;">
                    <i class="fas fa-envelope"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Email</div>
                    <div style="font-weight:700; color:#333;"
                         th:text="${appointment.patientEmail}">Email</div>
                </div>
            </div>

            <!-- Phone -->
            <div style="display:flex; align-items:center;
                             gap:14px; padding:13px 20px;
                             border-bottom:1px solid #f0f0f0;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px; display:flex;
                                 align-items:center; justify-content:center;
                                 color:white; font-size:0.9rem; flex-shrink:0;">
                    <i class="fas fa-phone"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Phone</div>
                    <div style="font-weight:700; color:#333;"
                         th:text="${appointment.patientPhone}">Phone</div>
                </div>
            </div>

            <!-- Doctor -->
            <div style="display:flex; align-items:center;
                             gap:14px; padding:13px 20px;
                             border-bottom:1px solid #f0f0f0;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px; display:flex;
                                 align-items:center; justify-content:center;
                                 color:white; font-size:0.9rem; flex-shrink:0;">
                    <i class="fas fa-user-md"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Doctor</div>
                    <div style="font-weight:700; color:#333;"
                         th:text="${appointment.doctorName}">Doctor</div>
                </div>
            </div>

            <!-- Specialization -->
            <div style="display:flex; align-items:center;
                             gap:14px; padding:13px 20px;
                             border-bottom:1px solid #f0f0f0;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px; display:flex;
                                 align-items:center; justify-content:center;
                                 color:white; font-size:0.9rem; flex-shrink:0;">
                    <i class="fas fa-stethoscope"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Specialization</div>
                    <div style="font-weight:700; color:#333;"
                         th:text="${appointment.specialization}">Spec</div>
                </div>
            </div>

            <!-- Date -->
            <div style="display:flex; align-items:center;
                             gap:14px; padding:13px 20px;
                             border-bottom:1px solid #f0f0f0;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px; display:flex;
                                 align-items:center; justify-content:center;
                                 color:white; font-size:0.9rem; flex-shrink:0;">
                    <i class="fas fa-calendar"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Date</div>
                    <div style="font-weight:700; color:#333;"
                         th:text="${#temporals.format(
                                       appointment.appointmentDate,
                                       'EEEE, MMMM dd, yyyy')}">
                        Date
                    </div>
                </div>
            </div>

            <!-- Time -->
            <div style="display:flex; align-items:center;
                             gap:14px; padding:13px 20px;
                             border-bottom:1px solid #f0f0f0;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px; display:flex;
                                 align-items:center; justify-content:center;
                                 color:white; font-size:0.9rem; flex-shrink:0;">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Time</div>
                    <div style="font-weight:700; color:#333;"
                         th:text="${#temporals.format(
                                       appointment.appointmentTime,
                                       'hh:mm a')}">
                        Time
                    </div>
                </div>
            </div>

            <!-- Reason -->
            <div style="display:flex; align-items:flex-start;
                             gap:14px; padding:13px 20px;">
                <div style="width:38px; height:38px;
                                 background:linear-gradient(135deg,#667eea,#764ba2);
                                 border-radius:10px; display:flex;
                                 align-items:center; justify-content:center;
                                 color:white; font-size:0.9rem;
                                 flex-shrink:0; margin-top:2px;">
                    <i class="fas fa-comment-medical"></i>
                </div>
                <div>
                    <div style="color:#888; font-size:0.78rem;">Reason</div>
                    <div style="font-weight:600; color:#333; font-size:0.9rem;"
                         th:text="${appointment.reason}">Reason</div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-3 mt-4">
            <a th:href="@{/appointments/reschedule/{id}(id=${appointment.id})}"
               class="btn-warning-grad"
               style="flex:1; text-align:center;
                          text-decoration:none; display:flex;
                          align-items:center; justify-content:center; gap:8px;">
                <i class="fas fa-edit"></i> Reschedule
            </a>
            <a href="/appointments/all"
               class="btn-ghost"
               style="flex:1; text-align:center;
                          text-decoration:none; display:flex;
                          align-items:center; justify-content:center; gap:8px;">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/appointment.js}"></script>
</body>
</html>
