<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthCarePlus - Profile Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f4f8;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 40%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0, transparent 40%);
            min-height: 100vh;
            color: #1e293b;
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(226, 232, 240, 0.8);
        }

        .premium-card {
            background: white;
            border-radius: 24px;
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item.active {
            background: rgba(37, 99, 235, 0.1);
            color: #2563eb;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: #2563eb;
            border-radius: 4px 0 0 4px;
        }

        .profile-image-large {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="flex">

<!-- Sidebar -->
<aside class="w-80 glass-sidebar h-screen p-8 flex flex-col sticky top-0 hidden lg:flex">
  <div class="mb-10">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
        <i class="fa-solid fa-user-gear"></i>
      </div>
      <span class="text-xl font-bold tracking-tight text-slate-800">PORTAL<span class="text-blue-600">SETTINGS</span></span>
    </div>

    <nav class="space-y-2">
      <a href="/patient/dashboard" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">
        <i class="fa-solid fa-grid-2"></i> Dashboard
      </a>
      <a href="/patient/book-appointment" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">
        <i class="fa-solid fa-calendar-plus"></i> Book Appointment
      </a>
      <a href="/patient/history" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">
        <i class="fa-solid fa-clock-rotate-left"></i> My History
      </a>
      <a href="/patient/profile" class="nav-item active flex items-center gap-4 px-4 py-3 rounded-xl font-semibold">
        <i class="fa-solid fa-user-pen"></i> Profile Settings
      </a>
    </nav>
  </div>

  <div class="mt-auto">
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-slate-400 font-bold hover:text-red-500 transition-all">
        <i class="fa-solid fa-power-off"></i> Sign Out
      </button>
    </form>
  </div>
</aside>

<main class="flex-1 p-6 md:p-10">
  <header class="mb-8">
    <h1 class="text-3xl font-extrabold tracking-tight">Profile <span class="text-blue-600">Management</span></h1>
    <p class="text-slate-500 mt-1">Update your account security and medical profile</p>
  </header>

  <div th:if="${param.success}" class="mb-6 p-4 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-2xl flex items-center gap-3">
    <i class="fa-solid fa-circle-check"></i>
    <span class="text-sm font-bold">Profile updated successfully!</span>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Left: Form -->
    <div class="lg:col-span-2">
      <div class="premium-card p-8">
        <form th:action="@{/patient/profile}" th:object="${user}" method="post">
          <h3 class="font-bold mb-6 text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-id-card text-blue-600"></i> Basic Information
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Full Name</label>
              <input type="text" th:field="*{fullName}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all" required>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Phone Number</label>
              <input type="text" th:field="*{phoneNo}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="md:col-span-2">
              <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Home Address</label>
              <input type="text" th:field="*{address}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
            </div>
          </div>

          <h3 class="font-bold mb-6 text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-heart-pulse text-rose-600"></i> Medical Profile
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Blood Group</label>
              <select th:field="*{bloodGroup}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
                <option value="">Select Group</option>
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="O+">O+</option><option value="O-">O-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Emergency Contact</label>
              <input type="text" th:field="*{emergencyContact}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
            </div>
          </div>

          <h3 class="font-bold mb-6 text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-lock text-emerald-600"></i> Security
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Update Password</label>
              <input type="password" th:field="*{password}" placeholder="Leave blank to keep current" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Profile Image URL</label>
              <input type="url" th:field="*{profileImage}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
            </div>
          </div>

          <div class="flex justify-end">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-200">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Right: Preview -->
    <div class="space-y-8">
      <div class="premium-card p-8 flex flex-col items-center">
        <img th:src="${user.profileImage ?: 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random'}" class="profile-image-large mb-6">
        <h3 class="font-bold text-xl" th:text="${user.fullName}">User Name</h3>
        <p class="text-slate-500 text-sm mb-6" th:text="${user.email}">email@example.com</p>
        <div class="w-full pt-6 border-t border-slate-100">
          <form th:action="@{/patient/delete-account}" method="post" onsubmit="return confirm('Warning: This action is permanent. Delete your account?');">
            <button type="submit" class="w-full py-3 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-xl font-bold transition-all uppercase tracking-widest text-[10px]">
              Delete My Account
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

</body>
</html>
