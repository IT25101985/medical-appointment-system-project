# =============================================
# Application Name
# =============================================
spring.application.name=medical-appointment-system

# =============================================
# MySQL Database Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/medical_appointment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Malith0826
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Thymeleaf
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# File Storage Path
# =============================================
app.file.appointments=src/main/resources/data/appointments.txt
app.file.logs=src/main/resources/data/appointment_log.txt