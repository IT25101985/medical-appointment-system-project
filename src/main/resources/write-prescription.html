<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Pad | Digital Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(30, 41, 59, 1); }
        .input-glow:focus { border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-3xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="/doctor/appointments" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-white transition-all">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-2xl font-bold">Write Prescription</h1>
    </div>

    <div class="glass-card rounded-3xl p-8 shadow-2xl">
        <div class="flex justify-between items-start mb-8 border-b border-slate-800 pb-6">
            <div>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Patient Details</p>
                <h2 class="text-xl font-bold" th:text="${appointment.patient.fullName}">Patient Name</h2>
                <p class="text-sm text-slate-400" th:text="'Age: 28 | Gender: Male | ID: #PT-' + ${appointment.patient.id}"></p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Date</p>
                <p class="text-sm font-bold text-emerald-500" th:text="${#temporals.format(#temporals.createNow(), 'MMM dd, yyyy')}"></p>
            </div>
        </div>

        <form th:action="@{/doctor/prescribe/{id}(id=${appointment.id})}" method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wide">Diagnosis & Notes</label>
                <textarea name="diagnosis" required rows="4" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-4 py-3 outline-none input-glow transition-all text-slate-200" placeholder="Enter patient diagnosis and clinical observations..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wide">Medication</label>
                    <input type="text" name="medication" required class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-4 py-3 outline-none input-glow transition-all text-slate-200" placeholder="e.g. Amoxicillin 500mg">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wide">Dosage</label>
                    <input type="text" name="dosage" required class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-4 py-3 outline-none input-glow transition-all text-slate-200" placeholder="e.g. 1-0-1 (After Meals)">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wide">Duration</label>
                    <input type="text" name="duration" required class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-4 py-3 outline-none input-glow transition-all text-slate-200" placeholder="e.g. 5 Days">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 uppercase tracking-wide">Medicine Price (Rs.)</label>
                    <input type="number" step="0.01" name="price" required class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-4 py-3 outline-none input-glow transition-all text-slate-200" placeholder="0.00">
                </div>
            </div>

            <div class="pt-6 border-t border-slate-800 flex justify-end">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-10 rounded-2xl transition-all shadow-lg shadow-emerald-500/20 flex items-center gap-2">
                    <i class="fa-solid fa-file-signature"></i> Finalize & Send Prescription
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
